# ═══════════════════════════════════════════════════════════════════
# Настройки сайта Елены Масоловой
# ═══════════════════════════════════════════════════════════════════
#
# Этот файл — источник правды для всего, что видно на сайте, но не
# является постом: имя в шапке, био, меню, подписка, внешние ссылки.
#
# Редактируется через админку (/admin/settings.html) — она сохраняет
# изменения обратно в этот же файл. Руками править тоже можно.
#
# ═══════════════════════════════════════════════════════════════════

# ─── Профиль (главная страница) ─────────────────────────────────────
profile:
  # Имя, которое видно в шапке сайта и в заголовке браузера.
  name: "Елена Масолова"

  # Фото на главной. Путь относительно корня сайта.
  # При загрузке нового фото из админки — сохраняется в assets/ и
  # ссылка обновляется здесь автоматически.
  photo: "/assets/elena.jpg"

  # Био на главной — один абзац под именем.
  bio: >
    продуктовый менеджер и основатель, делаю AI-инструменты для анализа
    рынка недвижимости и качества медиа-контента. Веду этот блог, пишу
    про продукт, данные и языки.

  # Список «о себе» на главной — по одному пункту на строку.
  # Поддерживает Markdown-ссылки [текст](url).
  about:
    - "Создала AI-поиск и аналитику для рынка недвижимости Балтии."
    - "Запустила MVP для автоматической проверки качества новостей."
    - "Веду проекты вокруг латышского и ливского языков."
    - "Пишу в [Телеграм-канал](https://t.me/...)."

# ─── Меню в шапке ───────────────────────────────────────────────────
# Порядок в списке = порядок на сайте. Перетаскивать в админке.
menu:
  - title: "Обо мне"
    url: "/about/"
  - title: "Проекты"
    url: "/projects/"
  - title: "Контакты"
    url: "/contacts/"

# ─── Email-рассылка ─────────────────────────────────────────────────
# К чему подключена кнопка «Подписаться» на сайте.
newsletter:
  # Варианты: none | buttondown | mailerlite | substack
  provider: "buttondown"

  # URL формы подписки — вставляется как action у формы на сайте.
  form_url: "https://buttondown.com/api/emails/embed-subscribe/elenamasolova"

  # Текст на главной над кнопкой подписки.
  title: "Новые статьи вам на почту"
  subtitle: "Дайджест каждые 2 недели."
  button_label: "Подписаться"

# ─── Внешние ссылки (футер, страница «Контакты») ────────────────────
external:
  telegram: "https://t.me/..."
  email: "elena@elenamasolova.com"

# ─── Хранилище картинок ─────────────────────────────────────────────
# Куда админка загружает картинки из постов.
# Варианты: repo (в assets/posts/, внутри репозитория) | r2 (Cloudflare R2)
media:
  provider: "r2"

  # Base URL для раздачи картинок. Для R2 — это custom domain бакета.
  # Картинки будут доступны как {base_url}/posts/{slug}/{filename}.
  # Пример: https://cdn.elenamasolova.com
  base_url: ""  # заполним после настройки CF R2

  # Параметры автосжатия при загрузке (применяются в браузере перед
  # отправкой в R2 — экономим квоту и ускоряем сайт).
  compression:
    format: "webp"
    max_width: 1600
    quality: 82

# ─── SEO (мета-теги всего сайта) ────────────────────────────────────
seo:
  site_title: "Елена Масолова"
  description: "Блог Елены Масоловой — продукт, данные, AI, языки."
  og_image: "/assets/elena.jpg"
