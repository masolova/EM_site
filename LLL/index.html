  <style>
    :root {
      --bg: #f4ede6;
      --shell: #fbf7f2;
      --shell-line: #e2d3ca;
      --panel: #fffdfa;

      --text: #452a33;
      --muted: #9a8586;
      --brand: #7a3340;
      --red: #c84444;
      --orange: #dd7a33;
      --yellowgreen: #96b83f;
      --green: #2f9658;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0 auto;
      font-family: Manrope, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #fbf6f1 0%, var(--bg) 60%, #efe6de 100%);
      color: var(--text);
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    button { touch-action: manipulation; }
    .shell {
      width: min(1440px, calc(100vw - 40px));
      height: min(900px, calc(100dvh - 32px));
      margin: 16px auto;
      background: var(--shell);
      border: 1px solid var(--shell-line);
      border-radius: 28px;
      display: grid;
      grid-template-rows: 68px 1fr;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(82, 46, 56, 0.08);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: #fffaf6;
      border-bottom: 1px solid var(--shell-line);
    }
    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .menu-link {
      cursor: pointer;
      height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid #dccdc3;
      background: #fffdfa;
      color: #6b3440;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .menu-link:hover { background: #f8efe9; }
    .menu-link {
      cursor: pointer;
      height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid #dccdc3;
      background: #fffdfa;
      color: #6b3440;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      }
    .menu-link:hover { background: #f8efe9; }
    .icon-btn,
    .brand-pill {
      height: 40px;
      border-radius: 999px;
      border: 1px solid #dccdc3;
      background: #fffdfa;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #6b3440;
    }
    .icon-btn {
      cursor: pointer;
      width: 40px;
      padding: 0;
    }
    .brand-pill {
      padding: 0 18px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      background: #f8efe9;
    }
    .page {
      padding: 22px 34px 26px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      min-height: 0;
    }
    .labels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 0 4px;
    }
    .labels div {
      font-size: 12px;
      line-height: 1;
      color: var(--muted);
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 700;
      text-align: center;
    }
    .content {
      display: grid;
      /* v52: minmax(0, 1fr) — жестко фиксируем 50/50, длинное слово не раздвигает левый трек. */
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 24px;
      min-height: 0;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-line);
      border-radius: 24px;
      padding: 30px 34px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 0;
      min-width: 0; /* v52: не раздувать grid трек под длинное слово */
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .panel .card-fav-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border: 0;
      background: transparent;
      cursor: pointer;
      color: #cbc5c1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 8px;
      transition: color .14s ease, transform .12s ease;
    }
    .panel .card-fav-btn:hover { color: #a61d1d; }
    .panel .card-fav-btn.active { color: #a61d1d; }
    .panel .card-fav-btn:active { transform: scale(.92); }
    .panel .card-fav-btn svg { width: 24px; height: 24px; display: block; }
    .phrase {
      font-family: Manrope, sans-serif;
      /* v50: одинаковый вес и размер у LV и RU */
      font-weight: 700;
      color: var(--text);
      font-size: clamp(30px, 2.7vw, 46px);
      line-height: 1.14;
      letter-spacing: -.03em;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      text-align: center;
      /* v52: длинные слова ломать, чтобы не раздвигать панель */
      overflow-wrap: anywhere;
    }
    /* v79-fix (BUG 2): на десктопе сердце (.card-fav-btn) абсолютно позиционировано в правом
       верхнем углу LV-панели (top:16px; right:16px; 36×36), но текст .phrase центрирован на всю
       ширину и не резервирует под него место — длинные фразы налезали на сердце.
       Резервируем верхний правый угол float-спейсером, чтобы первые строки обтекали сердце.
       Только на десктопе (на мобиле есть свои float-heart-* спаны). */
    @media (min-width: 601px) {
      .panel:first-of-type .phrase::before {
        content: "";
        float: right;
        width: 30px;   /* сердце вылезает ~18px в контент-бокс + запас */
        height: 42px;  /* перекрывает вертикаль сердца на первой строке */
        shape-outside: inset(0);
        pointer-events: none;
      }
    }
    /* (3.3) Длинные фразы — 4 ступени. Размер карточки НЕ меняется, только шрифт. */
    .panel.is-long .phrase,
    .panel.is-long .translation-text {
      font-size: clamp(28px, 2.4vw, 38px);
      line-height: 1.15;
      letter-spacing: -.03em;
    }
    .panel.is-xlong .phrase,
    .panel.is-xlong .translation-text {
      font-size: clamp(22px, 1.9vw, 30px);
      font-weight: 600;
      line-height: 1.22;
      letter-spacing: -.02em;
    }
    .panel.is-mega .phrase,
    .panel.is-mega .translation-text {
      font-size: clamp(16px, 1.4vw, 21px);
      font-weight: 600;
      line-height: 1.32;
      letter-spacing: -.01em;
    }
    .audio-btn {
      cursor: pointer;
      /* v52: центрирование через inset+margin вместо left:50%+transform.
         Из-за transition на transform раньше была видимая «поездка» кнопки влево при смене фразы. */
      position: absolute;
      left: 0;
      right: 0;
      bottom: 30px;
      margin: 0 auto;
      height: 54px;
      padding: 0 22px 0 18px;
      border-radius: 999px;
      border: 1px solid #d9c3bf;
      background: #fbf1ec;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      width: fit-content;
      font-size: 16px;
      font-weight: 700;
      color: #6b3440;
      box-shadow: 0 10px 20px rgba(82, 46, 56, 0.05);
    }
    .audio-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #ead6d2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--brand);
    }
    .phrase-col {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      /* v52: LV центрирована по высоте в верхней зоне (без нижней полосы 84px).
         RU подравнивается в JS под верхнюю строку LV. */
      justify-content: center;
      align-items: center;
      padding-top: 6px;
      padding-bottom: 84px; /* запас под абсолютную audio-btn */
    }
    .translate-wrap {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 30px;
      display: flex;
      justify-content: center;
      width: 100%;
      text-align: center;
    }
    .translate-wrap.show-text {
      /* v52: в потоке; flex-start, но padding-top динамический —
         выставляется в fitAllPanels так, чтобы верх RU совпал с верхом LV. */
      position: static;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 6px 0 84px;
    }
    .translate-btn {
      cursor: pointer;
      height: 54px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid #d9c3bf;
      background: #fbf1ec;
      color: #6b3440;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(82, 46, 56, 0.05);
    }
    .translation-text {
      display: none;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
      text-align: center;
      font-family: Manrope, sans-serif;
      /* v50: одинаковый размер и вес как у .phrase (LV) */
      font-size: clamp(30px, 2.7vw, 46px);
      line-height: 1.14;
      letter-spacing: -0.03em;
      font-weight: 700;
      color: var(--text);
      overflow-wrap: anywhere;
    }
    .translate-wrap.show-text .translate-btn {
      display: none;
    }
    .translate-wrap.show-text .translation-text {
      display: block;
    }
    .srs-zone {
      background: #faf3ed;
      border: 1px solid var(--panel-line);
      border-radius: 24px;
      padding: 18px 18px 20px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      min-height: 186px;
    }
    .srs-btn {
      cursor: pointer;
      border: 0;
      border-radius: 24px;
      color: #fff;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      min-width: 0;
      min-height: 148px;
      box-shadow: 0 14px 30px rgba(82, 46, 56, 0.08);
      overflow: hidden;
    }
    .srs-btn.red { background: var(--red); }
    .srs-btn.orange { background: var(--orange); }
    .srs-btn.yellowgreen { background: var(--yellowgreen); }
    .srs-btn.green { background: var(--green); }
    .srs-fill {
      width: 100%;
      height: 100%;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-width: 0;
      min-height: 0;
    }
    /* v58: бадж баллов убран — оставил для обратной совместимости но скрываю */
    .srs-top { display: none; }
    .srs-label {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(28px, 2.8vw, 46px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -.04em;
      word-break: break-word;
      hyphens: auto;
      text-wrap: balance;
    }
      .translate-btn.is-open { background: #f8efe9; }
    .is-pressed { transform: scale(0.97); }
    .srs-btn.is-selected {
      outline: 4px solid rgba(255,255,255,0.72);
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(82, 46, 56, 0.16);
    }
    /* v47: убираем синюю браузерную обводку после клика на кнопках (остаём только для клавиатуры) */
    .srs-btn:focus,
    .audio-btn:focus,
    .translate-btn:focus,
    button:focus { outline: none; }
    .srs-btn:focus-visible,
    .audio-btn:focus-visible,
    .translate-btn:focus-visible {
      outline: 2px solid rgba(122, 51, 64, 0.4);
      outline-offset: 2px;
    }

    .legacy-header .streak-btn {

    body.is-elena .legacy-header .deck-segmented button.secret-deck { display: inline-flex; }
    body.is-elena .vocab-filter-btn.secret-deck { display: inline-flex; }

    .translate-btn,
    .srs-btn {
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease, color .16s ease;
      will-change: transform, box-shadow;
    }
    /* v52: у audio-btn transition без transform — иначе видна анимация «прыжка» при смене фразы. */
    .audio-btn {
      transition: box-shadow .16s ease, background .16s ease, border-color .16s ease, color .16s ease;
    }
    /* v72: hover только для устройств с курсором. На iOS Safari hover залипал после тапа,
       кнопка оставалась сдвинутой вверх. На десктопе hover работает как раньше. */
    @media (hover: hover) and (pointer: fine) {
      .translate-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 30px rgba(82, 46, 56, 0.14);
        border-color: rgba(122, 51, 64, 0.28);

      .audio-btn:hover {
        box-shadow: 0 16px 30px rgba(82, 46, 56, 0.14);
        border-color: rgba(122, 51, 64, 0.28);
      }

        transform: translateY(-3px);
        box-shadow: 0 18px 34px rgba(82, 46, 56, 0.18);
      }
    }

      transform: translateY(0);
      box-shadow: 0 6px 12px rgba(82, 46, 56, 0.10);
    }
    .audio-btn:active {
      /* v52: без transform — центрирование через margin auto */
      box-shadow: 0 6px 12px rgba(82, 46, 56, 0.10);
    }

    .vocab-fav-btn {

    .recover-banner {
      background: rgba(153,27,27,.08);
      border-bottom: 1px solid #e7d3d3;
      padding: 10px 24px;
      font-size: 13px;
      color: #991b1b;
      text-align: center;
      font-weight: 500;
      /* Резервируем место всегда, чтобы календарь не прыгал. Скрываем содержимое через visibility. */
      visibility: hidden;
      min-height: 38px;
      box-sizing: border-box;
    }
    .recover-banner.is-visible { visibility: visible; }
    .recover-banner__close {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;

    .streak-body {
      padding: 0;
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }
    .streak-layout {
      display: grid;
      grid-template-columns: 60% 40%;
      align-items: stretch;
      min-height: calc(100dvh - 53px);
      background: #fafaf9;
    }
    .streak-left {
      padding: 34px 28px 24px 10%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }
    .streak-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 18px;
      background: #fafaf9;
    }
    .streak-big {
      font-size: 128px;
      font-weight: 800;
      color: #111111;
      line-height: .92;
      text-align: center;
      letter-spacing: -0.05em;
    }
    .streak-big small {
      display: block;
      font-size: 30px;
      font-weight: 500;
      color: #55504d;
      margin-top: 16px;
      letter-spacing: 0;
    }
    .streak-today {
      font-size: 18px;
      color: #a29b97;
      margin-top: 16px;
      text-align: center;
    }
    .heatmap-months {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 42px;
      gap: 5px;
      font-size: 12px;
      color: #aba3a0;
      margin-bottom: 8px;
      width: fit-content;
    }
    .heatmap {
      display: grid;
      grid-template-rows: repeat(7, 40px);
      grid-auto-flow: column;
      grid-auto-columns: 40px;
      gap: 4px;
      width: fit-content;
      margin-bottom: 12px;
    }
    .hm-cell {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      background: #efefef;
      border: none;
      cursor: default;
      box-sizing: border-box;
    }
    .hm-empty { background: #ebedf0; }
    /* GitHub-style 4 оттенка зелёного по интенсивности:
       hm-1 = 1–4 открытий, hm-2 = 5–10, hm-3 = 11–15, hm-4 = 16+ */
    .hm-1 { background: #9be9a8; }
    .hm-2 { background: #40c463; }
    .hm-3 { background: #30a14e; }
    .hm-4 { background: #216e39; }
    /* Старый класс «выполнено» — по умолчанию hm-2 (5+ открытий — день выполнен) */
    .hm-done { background: #40c463; }
    .hm-future { background: #ebedf0; opacity: .55; }
    .hm-recover { cursor: pointer; }
    .hm-recover:hover { outline: 2px solid #d7c1bf; }
    .hm-cell:hover { outline: 2px solid #d7c1bf; outline-offset: 1px; }
    .hm-tip {
      position: fixed;
      display: none;
      z-index: 9999;
      background: #1f1d1b;
      color: #ffffff;
      font-size: 24px;
      font-weight: 500;
      line-height: 1.3;
      padding: 10px 16px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: 0 6px 20px rgba(0,0,0,.22);
    }
    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #aba3a0;
      margin-top: 10px;
    }
    .heatmap-legend .hm-cell {
      width: 20px;
      height: 20px;
      border-radius: 5px;
    }
    .streak-hint {
      font-size: 12px;
      color: #aba3a0;
      margin-top: 8px;
      max-width: 520px;
      line-height: 1.35;
    }
    @media (max-width: 900px) {
      .streak-layout { display: flex; flex-direction: column; }
      .streak-left { border-right: 0; border-bottom: 0; border-top: 1px solid var(--shell-line); }
    }
    @media (max-width: 600px) {
      .streak-layout {
        display: flex;
        flex-direction: column;
        min-height: auto;
      }
      /* Сверху: карта. Снизу: цифра + «сегодня» */
      .streak-left { order: 1; padding: 16px 14px 8px; flex: 0 0 auto; align-items: stretch; }
      .streak-right { order: 2; padding: 16px 16px 24px; flex: 1 1 auto; align-items: center; text-align: center; }

      /* Большая цифра + компактный ряд с «сегодня» */
      .streak-big { font-size: 88px; line-height: .9; }
      .streak-big small { font-size: 18px; margin-top: 6px; font-weight: 600; }
      .streak-today { font-size: 14px; margin-top: 14px; }
      .streak-hint { font-size: 11px; max-width: none; }

      /* Карта на всю ширину: ячейки растягиваются */
      .heatmap, .heatmap-months {
        width: 100%;
        grid-auto-columns: minmax(0, 1fr);
      }
      .heatmap { grid-template-rows: repeat(7, minmax(0, 1fr)); aspect-ratio: var(--hm-aspect, 15 / 7); }
      .hm-cell { width: auto; height: auto; border-radius: 4px; }
      .heatmap-legend { font-size: 11px; gap: 6px; flex-wrap: wrap; }
      .heatmap-legend .hm-cell { width: 14px; height: 14px; border-radius: 3px; }
    }

    /* Круглая кнопка динамика слева от фразы — видна только на мобиле */
    .phrase-row { display: contents; }
    .audio-btn-mobile { display: none; }

    /* ────────────────────────────────────────────────────── */
    /* МОБИЛЬНАЯ ВЕРСИЯ — ГЛАВНЫЙ ЭКРАН                                          */
    /* ───────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      html, body { overflow: visible; overflow-x: hidden; height: auto; }
      body { background: var(--shell); }
      .shell {
        width: 100%;
        max-width: 100%;
        min-height: 100dvh;
        height: auto;
        margin: 0;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        display: flex;
        flex-direction: column;
        grid-template-rows: none;
        overflow: visible;
      }

      /* Компактный header */
      .legacy-header {
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 14px 8px;
        height: auto;
        row-gap: 10px;
      }
      .legacy-header .logo-name { font-size: 16px; font-weight: 800; letter-spacing: -0.03em; }
      /* (г) Декоративная иконка-«гамбургер» без функционала в лого — на мобиле скрываем. */
      .legacy-header .logo-mark { display: none; }

      /* Правая группа: streak + иконка словаря */
      /* v56: min-width:0 чтобы родитель не растягивался по seg.scrollWidth. */
      .legacy-header .header-right {
        order: 2;
        margin-left: auto;
        gap: 4px;
        min-width: 0;
      }

      /* Чипы колоды — отдельный ряд на всю ширину, горизонтальный скролл с fade-подсказкой справа */
      /* v56: width:100% + min-width:0 чтобы seg сжимался под родителя и содержимое скроллилось внутри. */
      .legacy-header .deck-segmented {
        order: 3;
        flex: 1 0 100%;
        width: 100%;
        min-width: 0;
        max-width: 100%;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: none;
        gap: 6px;
        /* Сдвигаем второй ряд вниз, чтобы «Войти» была над ним, а не над первым рядом. После логина этот отступ убирается — см. .auth-in . */
        margin-top: 6px;
        padding-bottom: 2px;
        padding-right: 8px;
        -webkit-overflow-scrolling: touch;
        /* Fade справа — подсказка о горизонтальном скролле */
        -webkit-mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 28px), transparent 100%);
                mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 28px), transparent 100%);
        scroll-snap-type: x proximity;
      }
      .legacy-header .deck-segmented::-webkit-scrollbar { display: none; }
      .legacy-header .deck-segmented button { scroll-snap-align: start; }
      /* Когда докрутили вправо — снимаем fade */
      .legacy-header .deck-segmented.scroll-end {
        -webkit-mask-image: none;
                mask-image: none;
        padding-right: 0;
      }
      .legacy-header .deck-segmented button {
        flex: 0 0 auto;
        padding: 10px 18px;
        font-size: 14px;
        min-height: 40px;
        touch-action: manipulation;
      }
      /* Streak и словарь — поменьше */
      .legacy-header .streak-btn { padding: 4px 6px; font-size: 13px; }
      .legacy-header .btn-icon { width: 32px; height: 32px; }

      /* На мобиле «Войти» — красная пилюля в ПРАВОМ ВЕРХНЕМ углу шапки (абсолютно поверх) */
      .legacy-header .auth-btn-icon { display: none; }
      .legacy-header .auth-btn-text { display: inline; }
      .legacy-header .auth-btn {
        position: absolute;
        top: 4px;
        right: 10px;
        z-index: 4;
        padding: 6px 14px;
        min-height: 30px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #991b1b;
        border: 1px solid #991b1b;
        color: #ffffff;
        font-size: 13px;
        font-weight: 700;
      }
      /* После логина лишнее место сверху убираем — сжимаем второй ряд обратно к шапке. */
      body.auth-in .legacy-header .deck-segmented { margin-top: 0; }
      /* (д) Залогиненный вид — без пилюли, просто текст на уровне логотипа. */
      .legacy-header .auth-btn--in {
        top: 14px;            /* выравниваем по baseline с «Lena Learns Latvian» */
        right: 14px;
        background: transparent;
        border-color: transparent;
        color: #5b504c;
        padding: 0;           /* нет капсулы — нет внутренних отступов */
        min-height: 0;
        gap: 6px;
        font-weight: 500;
        max-width: 160px;
        box-shadow: none;
        line-height: 1;
      }
      .legacy-header .auth-btn--in .auth-btn-name {
        font-weight: 600;
        color: #2d2424;
        font-size: 13px;
      }
      .legacy-header .auth-btn--in .auth-btn-logout {
        font-weight: 400;
        color: #9c918b;
        font-size: 12px;
        margin-left: 4px;
      }
      /* Чтобы правая группа (стрик/словарь) не залезала под пилюлю — резервируем справа отступ */
      .legacy-header .header-right { margin-right: 100px; }

      /* (3.2) Главная область — вертикальный поток; адаптивные отступы и гапы. */
      /* v58: page занимает всю оставшуюся высоту после header'a (flex:1). Полоса прогресса прижата к низу. */
      /* v67: убрал overflow:hidden — он обрезал .learned-progress на устройствах, где flex-children просили больше высоты, чем 100dvh.
         Места на экране достаточно, прогресс-бар теперь виден. Верхние блоки (header/чипы/панели/SRS) не трогаем. */
      .page {
        /* v75-r12: padding-bottom убран — теперь .srs-zone имеет собственный margin-bottom равный высоте полосы. */
        padding: clamp(8px, 1.4vh, 14px) 14px 0;
        gap: clamp(8px, 1.4vh, 14px);
        grid-template-rows: none;
        display: flex;
        flex-direction: column;
        min-height: 0;
        flex: 1 1 auto;
        height: auto;
        overflow: visible;
      }
      /* v58: app-shell flex-колонка на весь экран. */
      body, .app, #app, main {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        min-height: 0;
      }
      .labels { display: none; }

      .content {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 10px;
        flex: 1 1 auto;
        min-height: 0;
        /* v58: отдаём больше высоты панелям освобождённому от padding-bottom */
        /* v69: вернули панелям высоту — полоса прогресса теперь садится у самого края видимой зоны, а не съедает место. */
        /* v76-r4: vh → dvh — динамический viewport (учитывает состояние Safari URL-bar). 2 панели делят это пополам автоматически. */
        max-height: calc(min(58dvh, 460px) - var(--learned-progress-h) - env(safe-area-inset-bottom, 0px));
      }
      /* v56: в панели LV audio-btn скрыт на мобиле (используется круглая слева), большой padding-bottom больше не нужен. */
      .panel .phrase-col {
        height: 100%;
        padding-top: 0;
        padding-bottom: 0;
        justify-content: center;
      }
      /* v56: без перевода — кнопка в центре панели. */
      .panel .translate-wrap:not(.show-text) {
        position: static;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* v56: с переводом — текст RU центрируем по высоте блока (как LV). */
      .panel .translate-wrap.show-text {
        padding-top: 0;
        padding-bottom: 0;
        justify-content: center;
      }

      /* (3.2) Mobile: панель жёстко фиксирована по высоте — всё влезает в экран, fit-to-box ужмёт шрифт. */
      /* v76-r6: вертикальный padding панели сокращён с 14 до 8 — освобождает ~12px высоты под текст, fit подбирает шрифт крупнее. */
      .panel {
        padding: clamp(8px, 1.4vh, 14px) clamp(14px, 4vw, 22px);
        border-radius: 20px;
        height: 100%;
        min-height: 0;
        max-height: 100%;
        width: 100%;
        min-width: 0;
        overflow: hidden;
      }
      .panel > div { width: 100%; min-width: 0; }
      /* v60: вертикальное центрирование фразы */
      .panel > .phrase-col,
      .panel > .translate-wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .panel > .phrase-col > .phrase-row { display: contents; }
      .panel > .phrase-col { padding: 0; }

      /* v59: сердечко поднято выше (top:6), размер не меняется */
      .panel .card-fav-btn { top: 6px; right: 10px; width: 32px; height: 32px; }
      .panel .card-fav-btn svg { width: 22px; height: 22px; }

      /* v60: play-кнопка 44×44 absolute в правом-нижнем углу. Сердечко — верх-справа. */
      .phrase-row {
        display: contents;
      }
      .audio-btn-mobile {
        position: absolute;
        bottom: 10px;
        right: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 0;
        background: var(--brand);
        color: #fff;
        cursor: pointer;
        box-shadow: 0 6px 14px rgba(153, 27, 27, 0.28);
        transition: transform .14s ease, box-shadow .14s ease;
        z-index: 2;
      }
      .audio-btn-mobile svg { width: 20px; height: 20px; }
      .audio-btn-mobile:active { transform: scale(.94); }
      .audio-btn-mobile.is-playing { background: #7d1414; }
      .audio-btn-mobile:disabled, .audio-btn-mobile[disabled] {
        opacity: 0.85;
        cursor: default;
      }

      /* Скрываем старую кнопку «Прослушать» на мобиле — её роль взял динамик */
      .audio-btn { display: none; }

      /* (3.2) Адаптивный размер фразы: 17–23px в зависимости от высоты экрана. */
      /* v56: блоки стали меньше (170хвм вместо 238) — базовый размер чуть меньше, чтобы длинные фразы не наезжали на сердечко/audio-btn. */
      .phrase {
        font-size: clamp(18px, 3vh, 24px);
        line-height: 1.3;
        letter-spacing: -.02em;
        max-width: none;
        font-weight: 700;
        text-align: center;
        padding: 0;
      }
      /* v74-fix: padding-bottom управляется v74_fitAndCenterPanel через переменную --phrase-pad-bot.
         Раньше тут стояло "padding-bottom: 0" для всех — оно перебивало переменную и блокировало центрирование вверх. */
      .panel:nth-of-type(2) .phrase {
        padding-bottom: 0;
      }
      .panel:first-of-type .phrase-col { padding-bottom: 0; }

      /* v61: симметричные float-зоны вокруг кнопок.
         Каждая реальная кнопка получает зеркальную невидимую float-зону на противоположной стороне,
         чтобы line box оставалась симметричной относительно центра карточки и text-align:center
         центрировал каждую строку относительно ПОЛНОЙ ширины. */

      /* Heart top-right (LV-панель): 36×36 в начале текста — float left + float right одинаковые. */
      .panel:first-of-type .phrase .float-heart-left,
      .panel:first-of-type .phrase .float-heart-right {
        width: 36px;
        height: 36px;
        shape-outside: inset(0);
        pointer-events: none;
      }
      .panel:first-of-type .phrase .float-heart-left { float: left; }
      .panel:first-of-type .phrase .float-heart-right { float: right; }

      /* Play bottom-right (LV-панель): два пушера высотой = высота_текста - 50, потом две avoid-зоны 50×50 с clear. */
      .panel:first-of-type .phrase .float-push-left {
        float: left;
        width: 0;
        height: calc(100% - 50px);
      }
      .panel:first-of-type .phrase .float-push-right {
        float: right;
        width: 0;
        height: calc(100% - 50px);
      }
      .panel:first-of-type .phrase .float-avoid-play-left {
        float: left;
        clear: left;
        width: 50px;
        height: 50px;
        shape-outside: inset(0);
        pointer-events: none;
      }
      .panel:first-of-type .phrase .float-avoid-play-right {
        float: right;
        clear: right;
        width: 50px;
        height: 50px;
        shape-outside: inset(0);
        pointer-events: none;
      }
      /* phrase-col занимает всю оставшуюся высоту панели (flex:1), чтобы push-spacers работали относительно ПОЛНОЙ высоты. */
      .panel:first-of-type .phrase-col { display: block; flex: 1 1 auto; align-self: stretch; padding: 0; min-height: 0; }
      .panel:first-of-type .phrase {
        height: 100%;
        padding-top: var(--phrase-pad-top, 0px);
        padding-bottom: var(--phrase-pad-bot, 0px);
        box-sizing: border-box;
      }
      /* RU панель — без float'ов, просто центрированный текст */
      /* RU панель: text-align:center тоже */
      .panel:nth-of-type(2) .translation-text { text-align: center; }
      /* (3.3) Длинные фразы — меньше размер, без жирного. ОДИН размер для LV и RU. */
      .panel.is-long .phrase,
      .panel.is-long .translation-text {
        font-size: clamp(15px, 2vh, 18px);
        font-weight: 500;
        line-height: 1.3;
      }
      .panel.is-xlong .phrase,
      .panel.is-xlong .translation-text {
        font-size: clamp(13px, 1.7vh, 16px);
        font-weight: 500;
        line-height: 1.3;
      }
      .panel.is-mega .phrase,

        font-size: clamp(11px, 1.4vh, 13px);

        height: clamp(44px, 6vh, 56px);

        line-height: 1.25;
        letter-spacing: -.02em;
        font-weight: 700;
        max-width: none;

      .panel.is-long .translation-text,
      .panel.is-xlong .translation-text,

      /* Сетка оценок 2×2 — тоже адаптивная. */
      /* v56: сжал SRS-кнопки чтобы learned-progress влезала без скролла. */

      .srs-zone {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 8px;
        border-radius: 16px;
        min-height: 0;
        flex: 0 0 auto;
        /* v75-r12: жёсткий margin-bottom отодвигает SRS-зону выше полосы прогресса. flex не схлопывает margin внутри колонки. */
        margin-bottom: calc(var(--learned-progress-h) + env(safe-area-inset-bottom, 0px));
      }
      .srs-btn {
        min-height: clamp(72px, 10.5vh, 100px);
        border-radius: 14px;
        box-shadow: 0 4px 10px rgba(82, 46, 56, 0.08);

      /* v58: бадж скрыт на всех разрешениях */
      .srs-top { display: none; }
      .srs-label {
        font-size: 22px;
        font-weight: 900;
        letter-spacing: -.03em;

      /* v58: learned-progress прижата к низу экрана (margin-top:auto), safe-area учтена. */
      /* v69: полоса опущена к самому краю видимой зоны. padding-bottom минимальный — без зазора. */
      /* v75-r9: ПОЛОСА прижата к самому низу viewport. Высота реальная = 74px (покрывает overlap с кнопками + влияние safe-area). Каждый текстовый блок сокращается на 74/2 = 37px. */
      :root { --learned-progress-h: 74px; }
      .learned-progress {
        position: fixed;
        left: 0;
        right: 0;
        /* v76-r5: bottom:0 в iOS Safari относится к layout-viewport (статика для expanded URL-bar). В compact-режиме visible-area уезжает ниже layout-viewport на ~110px → полоса висит над URL-bar с огромным зазором. Фикс: позиционировать через top: 100dvh - height. dvh динамически отслеживает visible-area. */
        top: calc(100dvh - var(--learned-progress-h));
        height: var(--learned-progress-h);
        padding: 4px 14px 4px;
        gap: 4px;
        background: #fafaf9;
        z-index: 50;
        margin: 0;
        flex: none;
        box-sizing: border-box;
      }
      .learned-progress__label { font-size: 12px; }
      .learned-progress__track { height: 8px; }
      /* v75-r7: полная высота полосы резервируется в .page (выше), на main padding-bottom НЕ нужен. */

      /* ──────────────────────────────────── */
      /* СЛОВАРЬ НА МОБИЛЕ                              */
      /* ──────────────────────────────────── */
      .vocab-overlay { background: #ffffff; }

      .vocab-header {

      .vocab-search-wrap { width: 100%; }

      }
      .vocab-search { font-size: 15px; padding: 10px 12px 10px 36px; }
      .vocab-search-mobile-row::before { left: 26px; }

      /* Фильтры: горизонтальный скролл с fade-подсказкой */
      .vocab-filters {
        flex-wrap: nowrap;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: none;
        padding: 10px 14px;
        gap: 6px;
        -webkit-overflow-scrolling: touch;
        -webkit-mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 24px), transparent 100%);
                mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 24px), transparent 100%);

      .vocab-filters.scroll-end {

                mask-image: none;
      }
      .vocab-filters::-webkit-scrollbar { display: none; }
      .vocab-filter-btn {

      /* Статистику по стадиям на мобиле прячем — перегружает */
      .vocab-stage-stats { display: none; }

      /* Список */
      .vocab-list-wrap { padding: 0 14px 24px; }
      /* Плотные строки на мобиле — меньше вертикального воздуха, разделители остаются */
      .vocab-item {

      .vocab-lv { font-size: 17px; line-height: 1.25; }

      .btn-export-header { display: none; }
      .vocab-list-wrap { padding-bottom: 24px; }
    }

// (а) Блокировка pinch-zoom для iOS Safari (user-scalable=no игнорируется)
(function blockPinchZoom() {
  // Блокируем жест двумя пальцами (iOS-специфичное событие)
  document.addEventListener('gesturestart', function (e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturechange', function (e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('gestureend', function (e) { e.preventDefault(); }, { passive: false });
  // Блокируем мультитач
  document.addEventListener('touchstart', function (e) {
    if (e.touches && e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', function (e) {
    if (e.touches && e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  // Блокируем double-tap zoom
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function (e) {
    const now = Date.now();
    if (now - lastTouchEnd <= 350) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });
  document.addEventListener('dblclick', function (e) { e.preventDefault(); }, { passive: false });
})();

// Хелпер: правильное склонение «1 день / 2 дня / 5 дней»
function pluralizeDays(n) {
  const abs = Math.abs(n) % 100;
  const n1 = abs % 10;
  if (abs > 10 && abs < 20) return 'дней подряд';
  if (n1 > 1 && n1 < 5) return 'дня подряд';
  if (n1 === 1) return 'день подряд';
  return 'дней подряд';
}

    const start = new Date(today);
    start.setDate(today.getDate() - ((cols - 1) * rows + dowMon));

    const monthNames = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
    const monthFull = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    const dowFull = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
    const labels = Array(cols).fill('');
    let prevMonth = -1;
    for (let c = 0; c < cols; c++) {
      const d = new Date(start);
      d.setDate(start.getDate() + c * rows);
      const month = d.getMonth();
      if (month !== prevMonth) {
        labels[c] = monthNames[month];
        prevMonth = month;
      }
    }
    labels.forEach(label => {
      const div = document.createElement('div');
      div.textContent = label;
      heatmapMonths.appendChild(div);
    });

    const todayKeyStr = todayKey();
    for (let c = 0; c < cols; c++) {
      for (let r = 0; r < rows; r++) {
        const index = c * rows + r;
        const d = new Date(start);
        d.setDate(start.getDate() + index);
        const key = d.toISOString().slice(0, 10);
        const cell = document.createElement('div');
        const done = isDayDone(key);
        const count = getDayProgress(key);
        const isFuture = key > todayKeyStr;
        const isToday = key === todayKeyStr;
        // 4 уровня интенсивности GitHub-style
        let lvl = 'hm-empty';
        if (count >= 16) lvl = 'hm-4';
        else if (count >= 11) lvl = 'hm-3';
        else if (count >= 5) lvl = 'hm-2';
        else if (count >= 1) lvl = 'hm-1';
        cell.className = 'hm-cell ' + lvl;
        if (isFuture) cell.classList.add('hm-future');
        // Кастомный тултип: "понедельник, 28 апреля — 5 фраз"
        const dowLabel = dowFull[d.getDay()];
        const phrasesLabel = pluralizePhrases(count);
        const dateLabel = d.getDate() + ' ' + monthFull[d.getMonth()];
        cell.dataset.tip = isFuture
          ? (dowLabel + ', ' + dateLabel)
          : (dowLabel + ', ' + dateLabel + ' — ' + count + ' ' + phrasesLabel);
        cell.addEventListener('mouseenter', showHmTip);
        cell.addEventListener('mouseleave', hideHmTip);
        // v67: на тач-устройствах показываем плашку по тапу. Тап по другой ячейке заменяет плашку,
        // тап вне календаря или закрытие оверлея — прячет.
        cell.addEventListener('click', showHmTip);
        // Кликом восстанавливаем ТОЛЬКО прошлые пустые дни (не сегодня, не будущее, не выполненные)
        if (!done && !isFuture && !isToday) {
          cell.classList.add('hm-recover');
          cell.addEventListener('click', function () {
            streakState.recoverDate = key;
            saveStreak();
            updateStreakSummary();
            buildHeatmap();
          });
        }
        heatmap.appendChild(cell);
      }
    }
  }

  function pluralizePhrases(n) {
    const nn = Math.abs(n) % 100;
    const n1 = nn % 10;
    if (nn > 10 && nn < 20) return 'фраз';
    if (n1 > 1 && n1 < 5) return 'фразы';
    if (n1 === 1) return 'фраза';
    return 'фраз';
  }

  // Кастомный тултип хитмапа
  let hmTipEl = null;
  function ensureHmTip() {
    if (hmTipEl) return hmTipEl;
    hmTipEl = document.createElement('div');
    hmTipEl.className = 'hm-tip';
    document.body.appendChild(hmTipEl);
    return hmTipEl;
  }
  function showHmTip(ev) {
    const tip = ensureHmTip();
    tip.textContent = ev.currentTarget.dataset.tip || '';
    const r = ev.currentTarget.getBoundingClientRect();
    tip.style.display = 'block';
    // Позиционируем сверху по центру ячейки
    const tipR = tip.getBoundingClientRect();
    let left = r.left + r.width / 2 - tipR.width / 2;
    left = Math.max(8, Math.min(left, window.innerWidth - tipR.width - 8));
    const top = r.top - tipR.height - 8;
    tip.style.left = left + 'px';
    tip.style.top = (top < 4 ? r.bottom + 8 : top) + 'px';
  }
  function hideHmTip() {
    if (hmTipEl) hmTipEl.style.display = 'none';
  }
  function recordTranslation() {
    const key = streakState.recoverDate || todayKey();
    const state = streakState.days[key] || { count: 0 };
    // Снял cap, чтобы интенсивность хитмапа (4 уровня) отражала реальные открытия.
    state.count = state.count + 1;
    streakState.days[key] = state;
    if (state.count >= DAILY_GOAL && streakState.recoverDate === key) {
      streakState.recoverDate = null;
      showToast('День восстановлен');
    }
    saveStreak();
    updateStreakSummary();
    // v79-fix: хитмап виден только внутри оверлея streak. Не перестраиваем его (105 ячеек × 3 листенера)
    // на каждый клик «Показать перевод», когда оверлей закрыт — это блокировало main thread.
    // Тот же паттерн, что для renderVocab (рендер только при открытом оверлее). При открытии streak оверлея buildHeatmap вызывается (streakBtn).
    if (streakOverlay && streakOverlay.classList.contains('open')) buildHeatmap();
  }

  translationButton.addEventListener('click', function () {
    translationOpen = true;
    // v79-fix-perf: первый клик сессии может совпасть с pull из Supabase (auth.js):
    // парсинг 19кБ JSON в main thread + Realtime echo блокируют UI на ~3с.
    // Обновляем UI синхронно первым кадром, всю статистику/синхронизацию откладываем.
    translateWrap.classList.add('show-text');
    var item = currentPhrase();
    var translation = normalizeTranslation(item.ru);
    translationText.textContent = translation || 'Перевод отсутствует';
    // Сразу отдаём кадр браузеру, статистику/фит в следующем tick'е.
    var defer = window.requestIdleCallback || function(cb){ return setTimeout(cb, 0); };
    defer(function(){
      try { if (typeof fitAllPanels === 'function') fitAllPanels(); } catch(e){}
      try { recordTranslation(); } catch(e){ console.warn(e); }
    });
  });

  if (audioButton) {
    // Флаг: блокируем повторный запуск, пока идёт fetch или играет аудио — иначе эхо.
    let ttsBusy = false;
    function setAudioBusy(busy) {
      ttsBusy = busy;
      if (audioButton) audioButton.disabled = busy;
      if (audioButtonMobile) {
        audioButtonMobile.disabled = busy;
        audioButtonMobile.classList.toggle('is-playing', busy);
      }
    }
    audioButton.addEventListener('click', async function () {
      const text = phraseEl.textContent.trim();
      if (!text) return;
      // Если играет — останавливаем (toggle).
      if (ttsAudio && !ttsAudio.paused) {
        ttsAudio.pause();
        ttsAudio.currentTime = 0;
        setPlayIcon('play');
        setAudioBusy(false);
        return;
      }
      // Если уже загружаем — игнорируем клик.
      if (ttsBusy) return;
      setAudioBusy(true);
      audioButton.classList.add('is-pressed');
      setTimeout(function () { audioButton.classList.remove('is-pressed'); }, 150);
      setPlayIcon('pause');
      try {
        const r = await fetch(TRANSLATEWORKER, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'tts', text, lang: 'lv-LV' })
        });
        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        ttsAudio = new Audio(url);
        ttsAudio.addEventListener('ended', function () { setPlayIcon('play'); URL.revokeObjectURL(url); setAudioBusy(false); }, { once: true });
        ttsAudio.addEventListener('error', function () { setPlayIcon('play'); URL.revokeObjectURL(url); setAudioBusy(false); }, { once: true });
        await ttsAudio.play();
      } catch (e) {
        console.warn('TTS error', e);
        setPlayIcon('play');
        setAudioBusy(false);
      }
    });
  }

  srsButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      var phrase = currentPhrase();
      var phraseId = phrase && phrase.id ? String(phrase.id) : null;
      // Новые стадии: 0=Ужас-ужас (красная), 1=Ещё туплю (оранж), 2=ОК (жёлто-зел), 3=Выучено (зел)
      var stage = 0;
      if (btn.classList.contains('orange')) stage = 1;
      else if (btn.classList.contains('yellowgreen')) stage = 2;
      else if (btn.classList.contains('green')) stage = 3;
      srsButtons.forEach(function (b) { b.classList.remove('is-selected'); });
      btn.classList.add('is-selected');
      // v54: простая синхронная логика — как было до v53. setPhraseStage записывает в LS,
      // push в Supabase идёт debounce'ом (200мс) — async, не блокирует. nextPhrase синхронно.
      // НЕ перерисовываем словарь после каждого клика — это создавало сотни DOM-нод и забивало
      // main thread, из-за чего перевод/словарь/тени тормозили.
      if (phraseId) setPhraseStage(phraseId, stage);
      if (stage === 3) {
        ensureVocabEntry(true);
        showToast('Фраза перенесена в выученное');
      }
      nextPhrase();
      // Словарь перерисуем ТОЛЬКО если он сейчас открыт. Иначе — лень-рендер при следующем открытии.
      var vo = document.getElementById('vocabOverlay');
      if (vo && vo.classList.contains('open')) {
        var ric = window.requestIdleCallback || function(cb){ return setTimeout(cb, 200); };
        ric(function(){ try { renderVocab(); } catch(e){} });
      }
    });
  });

  iconButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      btn.classList.add('is-pressed');
      setTimeout(function () { btn.classList.remove('is-pressed'); }, 150);
    });
  });

  menuLinks.forEach(function (link) {
    link.addEventListener('click', function (e) {
      e.preventDefault();
      menuLinks.forEach(function (l) { l.classList.remove('active-link'); });
      link.classList.add('active-link');
    });
  });

  // На мобиле перемещаем поиск НИЖЕ фильтров, чтобы при открытии словаря не вылезала клавиатура.
  function reorderVocabForViewport() {
    const overlay = document.getElementById('vocabOverlay');
    if (!overlay) return;
    const header = overlay.querySelector('.vocab-header');
    const headerRight = overlay.querySelector('.vocab-header-right');
    const searchWrap = overlay.querySelector('.vocab-search-wrap');
    const filters = overlay.querySelector('.vocab-filters');
    const list = overlay.querySelector('.vocab-list-wrap');
    if (!searchWrap || !filters || !list) return;
    const isMobile = window.matchMedia('(max-width: 600px)').matches;
    if (isMobile) {
      // Выносим поиск из шапки и кладём между фильтрами и списком
      if (searchWrap.parentElement === headerRight) {
        overlay.insertBefore(searchWrap, list);
        searchWrap.classList.add('vocab-search-mobile-row');
      }
    } else {
      // Возвращаем в шапку
      if (searchWrap.parentElement !== headerRight && headerRight) {
        headerRight.insertBefore(searchWrap, headerRight.firstChild);
        searchWrap.classList.remove('vocab-search-mobile-row');
      }
    }
  }
  window.addEventListener('resize', reorderVocabForViewport);
  reorderVocabForViewport();

  vocabToggle.addEventListener('click', function () {
    reorderVocabForViewport();
    vocabOverlay.classList.add('open');
    // v52: рендер в следующий кадр — иначе оверлей появляется с задержкой 1-2 сек.
    requestAnimationFrame(function(){ renderVocab(); });
    if (vocabSearch && window.matchMedia('(min-width: 601px)').matches) vocabSearch.focus();
  });
  vocabClose.addEventListener('click', function () { vocabOverlay.classList.remove('open'); });
  streakBtn.addEventListener('click', function () { streakOverlay.classList.add('open'); updateStreakSummary(); buildHeatmap(); });
  streakClose.addEventListener('click', function () { streakOverlay.classList.remove('open'); hideHmTip(); });
  // v75-r4/r5: auth.js кладёт свежие данные в localStorage и диспатчит lll:cloud-sync.
  // Раньше этот событие в index.html никто не слушал — поэтому streakState (in-memory)
  // оставался старым до перезагрузки. r5: безусловное перечитывание — не доверяем флагам detail.
  function reloadStreakFromStorage() {
    try {
      var raw = localStorage.getItem(STORAGE_STREAK) || '{}';
      var parsed = JSON.parse(raw);
      streakState = Object.assign({ days: {}, recoverDate: null }, parsed);
    } catch(e) { console.warn('[reload streak]', e); }
    try { updateStreakSummary(); } catch(e) {}
    try { buildHeatmap(); } catch(e) {}
  }
  function reloadPhraseStateFromStorage() {
    try {
      var ps = JSON.parse(localStorage.getItem(STORAGE_PHRASE_STATE) || '{}');
      if (typeof phraseState !== 'undefined') {
        Object.keys(phraseState).forEach(function(k){ delete phraseState[k]; });
        Object.keys(ps).forEach(function(k){ phraseState[k] = ps[k]; });
      }
    } catch(e) {}
    try { invalidatePhraseRangeIndex(); } catch(e) {}
    try { updateLearnedProgress(); } catch(e) {}
  }
  window.addEventListener('lll:cloud-sync', function () {
    // Безусловно — не смотрим на флаги в detail (они могут быть false из-за разного порядка ключей в JSON.stringify).
    try { reloadStreakFromStorage(); } catch(e) {}
    try { reloadPhraseStateFromStorage(); } catch(e) {}
  });
  // При возврате во вкладку и фокусе — тоже перечитываем на случай если auth.js получил данные, но не диспатчил событие.
  document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'visible') {
      // Даём auth.js время сделать pull, затем перечитываем
      setTimeout(function() { reloadStreakFromStorage(); reloadPhraseStateFromStorage(); }, 1500);
    }
  });
  window.addEventListener('focus', function () {
    setTimeout(function() { reloadStreakFromStorage(); reloadPhraseStateFromStorage(); }, 1500);
  });
  // v67: тап вне ячейки внутри оверлея — прячем плашку (на тач-устройстве mouseleave не срабатывает).
  streakOverlay.addEventListener('click', function (ev) {
    if (!ev.target.closest('.hm-cell')) hideHmTip();
  });
  vocabSearch.addEventListener('input', function (e) { vocabSearchQuery = e.target.value.trim().toLowerCase(); renderVocab(); });
  document.querySelectorAll('.vocab-filter-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.vocab-filter-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      vocabFilter = btn.dataset.filter;
      renderVocab();
    });
  });
  // Scroll-end логика для vocab-фильтров (убираем fade-маску когда докрутили до конца)
  (function() {
    var vocabFiltersEl = document.querySelector('.vocab-filters');
    if (!vocabFiltersEl) return;
    function updateVocabFiltersScrollEnd() {
      var max = vocabFiltersEl.scrollWidth - vocabFiltersEl.clientWidth;
      if (max <= 2) vocabFiltersEl.classList.add('scroll-end');
      else vocabFiltersEl.classList.toggle('scroll-end', vocabFiltersEl.scrollLeft >= max - 2);
    }
    vocabFiltersEl.addEventListener('scroll', updateVocabFiltersScrollEnd, { passive: true });
    window.addEventListener('resize', updateVocabFiltersScrollEnd);
    setTimeout(updateVocabFiltersScrollEnd, 0);
    // Пересчитать при открытии словаря
    var vt = document.getElementById('vocabToggle');
    if (vt) vt.addEventListener('click', function() { setTimeout(updateVocabFiltersScrollEnd, 50); });
  })();
  // Переход на карточку по id фразы. Если id вне текущей колоды — переключаем колоду.
  function goToPhraseId(id) {
    if (id == null) return false;
    var sId = String(id);
    var phraseInPhrases = (Array.isArray(PHRASES) ? PHRASES : []).find(function(p){ return p && String(p.id) === sId; });
    if (!phraseInPhrases) return false;
    // Если фразы нет в текущей колоде — выбираем подходящую (по диапазону) или «Все».
    var idx = deck.findIndex(function(p){ return p && String(p.id) === sId; });
    if (idx < 0) {
      var nId = Number(id);
      var newMode = 'all';
      if (Number.isFinite(nId)) {
        // v75-fix: используем deckOf() чтобы учесть DECK_OVERRIDES
        var dk = (typeof deckOf === 'function') ? deckOf(nId) : null;
        if (dk && DECK_RANGES[dk]) newMode = dk;
      }
      // Если фраза секретная, а юзер не Лена — не переключаем.
      if (isSecretId(id) && !isElenaUser()) return false;
      if (newMode !== deckMode) {
        deckMode = newMode;
        try { localStorage.setItem(STORAGE_DECK_MODE, deckMode); } catch(_) {}
        if (typeof syncDeckSegmented === 'function') syncDeckSegmented();
        deck = buildDeck();
      }
      idx = deck.findIndex(function(p){ return p && String(p.id) === sId; });
      if (idx < 0) return false;
    }
    currentIndex = idx;
    if (typeof renderPhrase === 'function') renderPhrase();
    if (typeof updateLearnedProgress === 'function') updateLearnedProgress();
    return true;
  }

  vocabListWrap.addEventListener('click', function (e) {
    const btn = e.target.closest('[data-action]');
    if (btn) {
      const id = btn.dataset.id;
      if (!id) return;
      const phrase = (Array.isArray(PHRASES) ? PHRASES : []).find(p => p && String(p.id) === String(id));
      if (!phrase) return;
      if (btn.dataset.action === 'fav') {
        const lv = normalizeTranslation(phrase.lv);
        const ru = normalizeTranslation(phrase.ru);
        let found = vocabulary.find(v => String(v.id) === String(id));
        if (!found) {
          found = { id: phrase.id, lv, ru, fav: true, learned: false };
          vocabulary.push(found);
        } else {
          found.fav = !found.fav;
        }
        saveVocab(); updateBadge(); renderVocab();
        if (typeof syncCardFav === 'function') syncCardFav();
      }
      return;
    }
    // Клик по самой строке (не по сердечку) — переход на эту карточку.
    const row = e.target.closest('.vocab-item');
    if (!row || !row.dataset.id) return;
    if (goToPhraseId(row.dataset.id)) {
      vocabOverlay.classList.remove('open');
    }
  });
  // Enter / Space на строке словаря — тоже открывает карточку.
  vocabListWrap.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const row = e.target.closest('.vocab-item');
    if (!row || !row.dataset.id) return;
    if (e.target.closest('[data-action]')) return;
    e.preventDefault();
    if (goToPhraseId(row.dataset.id)) {
      vocabOverlay.classList.remove('open');
    }
  });
  vocabExport.addEventListener('click', function () {
    const rows = ['Latviešu,Перевод'].concat(vocabulary.map(v => '"' + v.lv.replace(/"/g,'""') + '","' + v.ru.replace(/"/g,'""') + '"'));
    const csvText = '\ufeff' + rows.join('\n');
    const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'my-vocabulary.csv'; a.click(); URL.revokeObjectURL(url);
  });

  updateBadge();
  // v82-fix: renderVocab() и buildHeatmap() не нужны на старте — оверлеи закрыты.
  // Рендерятся при открытии оверлеев (vocabBtn click → renderVocab(); streakBtn click → buildHeatmap()).
  // Без этога рендер 3875 слов словаря + 105 ячеек хитмапа блокировал main thread на старте.
  updateStreakSummary();
  refillBatch();
  srsNext();
  renderPhrase();
  setPlayIcon('play');

  // Приход данных из облака (Realtime/pull) — перерисовываем без сброса текущей фразы.
  // v52: отложенный renderVocab через idle — чтобы не блокировать клик SRS
  // и не создавать впечатление «фраза сама поменялась» (перерисовка = воспринимается как смена).
  window.addEventListener('lll:cloud-sync', function (ev) {
    var d = (ev && ev.detail) || {};
    if (d.vocab) {
      try { vocabulary = JSON.parse(localStorage.getItem('lll2_vocabulary') || '[]'); } catch (e) {}
    }
    if (d.state) {
      try { phraseState = JSON.parse(localStorage.getItem('lll2_phrase_state') || '{}'); } catch (e) {}
    }
    if (d.streak) {
      try { streakState = JSON.parse(localStorage.getItem('lll2_streak') || '{"days":{},"recoverDate":null}'); } catch (e) {}
    }
    if (d.stage) {
      try { stageProgress = JSON.parse(localStorage.getItem('lll2_stage_progress') || '{}'); } catch (e) {}
    }
    updateBadge();
    // v56: streak-индикатор в шапке (#streakNum) обновляем ВСЕГДА после cloud-sync,
    // иначе при первом заходе шапка показывает 0 пока пользователь не откроет оверлей.
    try { updateStreakSummary(); } catch(e){}
    // renderVocab и buildHeatmap — только если соотв. оверлей открыт.
    var ric = window.requestIdleCallback || function(cb){ return setTimeout(cb, 100); };
    ric(function(){
      try {
        var vo = document.getElementById('vocabOverlay');
        if (vo && vo.classList.contains('open')) renderVocab();
      } catch(e){}
      try {
        var so = document.getElementById('streakOverlay');
        if (so && so.classList.contains('open')) { buildHeatmap(); }
      } catch(e){}
      try { if (typeof updateLearnedProgress === 'function') updateLearnedProgress(); } catch(e){}
    });
  });
});
</script>
  <div class="vocab-overlay" id="vocabOverlay">
    <div class="vocab-header">
      <div class="vocab-header-left">
        <button class="icon-btn" id="vocabClose" title="Закрыть">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <span class="vocab-title">Мой словарь</span>
        <span class="vocab-count-label" id="vocabCountLabel">· 0 слов</span>
      </div>
      <div class="vocab-header-right">
        <div class="vocab-search-wrap"><input class="vocab-search" id="vocabSearch" type="text" placeholder="Поиск по словарю"></div>
        <button class="btn-export btn-export-header" id="vocabExport">Скачать</button>
      </div>
    </div>
    <div class="vocab-filters">
      <button class="vocab-filter-btn active" data-filter="all">Все <span class="filter-count" id="countAll">0</span></button>
      <button class="vocab-filter-btn vocab-filter-heart" data-filter="fav" title="Избранное" aria-label="Избранное">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#c14444" stroke="#c14444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="filter-count" id="countFav">0</span>
      </button>
      <button class="vocab-filter-btn" data-filter="a2">A2 <span class="filter-count" id="countA2">0</span></button>
      <button class="vocab-filter-btn" data-filter="b2">B2 <span class="filter-count" id="countB2">0</span></button>
      <button class="vocab-filter-btn" data-filter="numbers">Числа <span class="filter-count" id="countNumbers">0</span></button>
      <button class="vocab-filter-btn" data-filter="questions">Вопросы <span class="filter-count" id="countQuestions">0</span></button>
      <button class="vocab-filter-btn secret-deck" data-filter="runasana">Runāšana <span class="filter-count" id="countRunasana">0</span></button>
      <button class="vocab-filter-btn secret-deck" data-filter="lena">Карточки Лены <span class="filter-count" id="countLena">0</span></button>
      <button class="vocab-filter-btn secret-deck" data-filter="top">Топ <span class="filter-count" id="countTop">0</span></button>
      <button class="vocab-filter-btn secret-deck" data-filter="otvety">Ответы <span class="filter-count" id="countOtvety">0</span></button>
      <button class="vocab-filter-btn secret-deck" data-filter="teksty">Тексты <span class="filter-count" id="countTeksty">0</span></button>
      <button class="vocab-filter-btn" data-filter="learned">Выучено <span class="filter-count" id="countLearned">0</span></button>
      <!-- v37: блок статистики по этапам убран — полоса фильтров не переполняется -->
    </div>
    <div class="vocab-list-wrap" id="vocabListWrap">
      <div class="vocab-empty-state" id="vocabEmpty">Пока словарь пуст.</div>
    </div>

  </div>

  <div class="vocab-overlay" id="streakOverlay">
    <div class="vocab-header">
      <div class="vocab-header-left">
        <span class="vocab-title">Стрик</span>
      </div>
      <div class="vocab-header-right">
        <button class="icon-btn" id="streakClose" title="Закрыть">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
    </div>
    <div class="recover-banner" id="recoverBanner"></div>
    <div class="streak-body">
      <div class="streak-layout">
        <div class="streak-left">
          <div class="heatmap-months" id="heatmapMonths"></div>
          <div class="heatmap" id="heatmap"></div>
          <div class="heatmap-legend"><span>Меньше</span><span class="hm-cell hm-empty"></span><span class="hm-cell hm-1"></span><span class="hm-cell hm-2"></span><span class="hm-cell hm-3"></span><span class="hm-cell hm-4"></span><span>Больше</span></div>
          <div class="streak-hint">Клик на пустой день = восстановить</div>
        </div>
        <div class="streak-right">
          <div class="streak-big" id="streakBig">0<small>дней подряд</small></div>
          <div class="streak-today" id="streakToday">Сегодня: 0 / 5</div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" style="display:none"></div>

  <div class="version-tag" aria-hidden="true">v84</div>
  <style>
    .version-tag {
      position: fixed;
      right: 6px;
      bottom: 4px;
      font-size: 10px;
      color: #1f1f1f;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      pointer-events: none;
      user-select: none;
      opacity: 1;
      z-index: 1;
    }
    @media (max-width: 600px) {
      .version-tag { display: none; }
    }
  </style>

</body>
</html>
