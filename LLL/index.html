  <style>
    :root {
      --bg: #f4ede6;
      --shell: #fbf7f2;
      --shell-line: #e2d3ca;
      --panel: #fffdfa;
      --panel-line: #e4d7cf;
      --text: #452a33;
      --muted: #9a8586;
      --brand: #7a3340;
      --red: #c84444;
      --orange: #dd7a33;
      --yellowgreen: #96b83f;
      --green: #2f9658;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0 auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      background: radial-gradient(circle at top, #fbf6f1 0%, var(--bg) 60%, #efe6de 100%);
      color: var(--text);
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    button { touch-action: manipulation; }
    .shell {
      width: min(1440px, calc(100vw - 40px));
      height: min(900px, calc(100vh - 32px));
      margin: 16px auto;
      background: var(--shell);
      border: 1px solid var(--shell-line);
      border-radius: 28px;
      display: grid;
      grid-template-rows: 68px 1fr;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(82, 46, 56, 0.08);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: #fffaf6;
      border-bottom: 1px solid var(--shell-line);
    }
    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .menu-link {
      cursor: pointer;
      height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid #dccdc3;
      background: #fffdfa;
      color: #6b3440;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .menu-link:hover { background: #f8efe9; }
    .menu-link {
      cursor: pointer;
      height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid #dccdc3;
      background: #fffdfa;
      color: #6b3440;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      }
    .menu-link:hover { background: #f8efe9; }
    .icon-btn,
    .brand-pill {
      height: 40px;
      border-radius: 999px;
      border: 1px solid #dccdc3;
      background: #fffdfa;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #6b3440;
    }
    .icon-btn {
      cursor: pointer;
      width: 40px;
      padding: 0;
    }
    .brand-pill {
      padding: 0 18px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      background: #f8efe9;
    }
    .page {
      padding: 22px 34px 26px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      min-height: 0;
    }
    .labels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 0 4px;
    }
    .labels div {
      font-size: 12px;
      line-height: 1;
      color: var(--muted);
      letter-spacing: .14em;
      text-transform: uppercase;
      font-weight: 700;
      text-align: center;
    }
    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      min-height: 0;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-line);
      border-radius: 24px;
      padding: 30px 34px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 0;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .panel .card-fav-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border: 0;
      background: transparent;
      cursor: pointer;
      color: #cbc5c1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 8px;
      transition: color .14s ease, transform .12s ease;
    }
    .panel .card-fav-btn:hover { color: #a61d1d; }
    .panel .card-fav-btn.active { color: #a61d1d; }
    .panel .card-fav-btn:active { transform: scale(.92); }
    .panel .card-fav-btn svg { width: 24px; height: 24px; display: block; }
    .phrase {
      font-size: clamp(34px, 3vw, 48px);
      line-height: 1.12;
      letter-spacing: -.04em;
      max-width: 100%;
      margin: 0 auto;
      text-align: center;
    }
    /* (3.3) Длинные фразы — 4 ступени. Размер карточки НЕ меняется, только шрифт. */
    .panel.is-long .phrase,
    .panel.is-long .translation-text {
      font-size: clamp(28px, 2.4vw, 38px);
      line-height: 1.15;
      letter-spacing: -.03em;
    }
    .panel.is-xlong .phrase,
    .panel.is-xlong .translation-text {
      font-size: clamp(22px, 1.9vw, 30px);
      font-weight: 600;
      line-height: 1.22;
      letter-spacing: -.02em;
    }
    .panel.is-mega .phrase,
    .panel.is-mega .translation-text {
      font-size: clamp(16px, 1.4vw, 21px);
      font-weight: 600;
      line-height: 1.32;
      letter-spacing: -.01em;
    }
    .audio-btn {
      cursor: pointer;
      align-self: center;
      margin-top: 26px;
      height: 54px;
      padding: 0 22px 0 18px;
      border-radius: 999px;
      border: 1px solid #d9c3bf;
      background: #fbf1ec;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      width: fit-content;
      font-size: 16px;
      font-weight: 700;
      color: #6b3440;
      box-shadow: 0 10px 20px rgba(82, 46, 56, 0.05);
    }
    .audio-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #ead6d2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--brand);
    }
    .translate-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      text-align: center;
    }
    .translate-btn {
      cursor: pointer;
      height: 56px;
      padding: 0 28px;
      border-radius: 999px;
      border: 1px solid #d9cdc4;
      background: #fffdfa;
      color: #6b4b51;
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(82, 46, 56, 0.05);
    }
    .translation-text {
      display: none;
      max-width: 100%;
      margin: 0 auto;
      text-align: center;
      font-size: clamp(30px, 2.7vw, 46px);
      line-height: 1.14;
      letter-spacing: -0.04em;
      font-weight: 800;
      color: #6b4b51;
    }
    .translate-wrap.show-text .translate-btn {
      display: none;
    }
    .translate-wrap.show-text .translation-text {
      display: block;
    }
    .srs-zone {
      background: #faf3ed;
      border: 1px solid var(--panel-line);
      border-radius: 24px;
      padding: 18px 18px 20px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      min-height: 186px;
    }
    .srs-btn {
      cursor: pointer;
      border: 0;
      border-radius: 24px;
      color: #fff;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      min-width: 0;
      min-height: 148px;
      box-shadow: 0 14px 30px rgba(82, 46, 56, 0.08);
      overflow: hidden;
    }
    .srs-btn.red { background: var(--red); }
    .srs-btn.orange { background: var(--orange); }
    .srs-btn.yellowgreen { background: var(--yellowgreen); }
    .srs-btn.green { background: var(--green); }
    .srs-fill {
      width: 100%;
      height: 100%;
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: stretch;
      min-width: 0;
      min-height: 0;
    }
    .srs-top {
      display: flex;
      justify-content: flex-end;
      font-size: clamp(20px, 1.65vw, 28px);
      line-height: 1;
      font-weight: 800;
      opacity: .92;
      letter-spacing: -.03em;
    }
    .srs-label {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(28px, 2.8vw, 46px);
      line-height: .94;
      font-weight: 900;
      letter-spacing: -.06em;
      word-break: break-word;
      hyphens: auto;
      text-wrap: balance;
    }
      .translate-btn.is-open { background: #f8efe9; }
    .is-pressed { transform: scale(0.97); }
    .srs-btn.is-selected {
      outline: 4px solid rgba(255,255,255,0.72);
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(82, 46, 56, 0.16);
    }
  

    .legacy-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid #e7e5e4;
      background: #ffffff;
      height: 58px;
      flex-shrink: 0;
      position: relative;
    }
    .legacy-header .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .legacy-header .logo-mark {
      width: 32px;
      height: 32px;
      background: #991b1b;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(153, 27, 27, 0.18);
    }
    .legacy-header .logo-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #1c1917;
    }
    .legacy-header .logo-name .red { color: #991b1b; }
    .legacy-header .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legacy-header .btn-icon,
    .legacy-header .streak-btn {
      cursor: pointer;
    }
    .legacy-header .btn-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      border-radius: 8px;
      color: #57534e;
      position: relative;
      font-family: Inter, system-ui, sans-serif;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease, color .16s ease;
    }
    .legacy-header .btn-icon:hover {
      background: rgba(153,27,27,.07);
      color: #1c1917;
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(28, 25, 23, 0.10);
    }
    /* Кнопка «Войти» / аккаунта в шапке */
    .legacy-header .auth-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #e1ddd9;
      background: #fff;
      color: #5a4a44;
      font-family: Inter, system-ui, sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .legacy-header .auth-btn:hover {
      background: rgba(153,27,27,.06);
      color: #991b1b;
      border-color: rgba(153,27,27,.3);
    }
    .legacy-header .auth-btn--in {
      background: #fff;
      color: #3a9760;
      border-color: rgba(58,151,96,.4);
    }
    .legacy-header .auth-btn--in:hover {
      background: rgba(58,151,96,.08);
      color: #2c7847;
      border-color: rgba(58,151,96,.6);
    }
    .legacy-header .auth-btn-icon { display: block; flex-shrink: 0; }
    .legacy-header .vocab-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      min-width: 16px;
      height: 16px;
      background: #991b1b;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 99px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    /* (5) Бейдж с числом выключён — бессмысленный индикатор. */
    .legacy-header .vocab-badge.show { display: none; }
    .legacy-header .streak-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      border: none;
      background: none;
      font-family: Inter, system-ui, sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #57534e;
      padding: 4px 8px;
      border-radius: 8px;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease, color .16s ease;
    }
    .legacy-header .streak-btn:hover {
      background: rgba(153,27,27,.07);
      color: #991b1b;
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(28, 25, 23, 0.10);
    }
    .legacy-header .streak-btn svg { color: #991b1b; }
    .legacy-header .streak-btn.active { color: #991b1b; }

    .legacy-header .deck-segmented {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      font-family: Inter, system-ui, sans-serif;
    }
    .legacy-header .deck-segmented button {
      border: 1px solid #e7e5e4;
      background: #fff;
      color: #57534e;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .1px;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: background .16s ease, color .16s ease, border-color .16s ease, box-shadow .16s ease, transform .12s ease;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .legacy-header .deck-segmented button:hover {
      background: rgba(153,27,27,.06);
      color: #991b1b;
      border-color: rgba(153,27,27,.25);
    }
    .legacy-header .deck-segmented button.active {
      background: #991b1b;
      color: #fff;
      border-color: #991b1b;
      box-shadow: 0 1px 3px rgba(153,27,27,.25);
    }
    .legacy-header .deck-segmented button:active { transform: translateY(1px); }
    @media (max-width: 720px) {
      .legacy-header .deck-segmented button { padding: 5px 10px; font-size: 11px; }
    }
    /* Секретные чипы — видны только Лене */
    .legacy-header .deck-segmented button.secret-deck,
    .vocab-filter-btn.secret-deck { display: none; }
    body.is-elena .legacy-header .deck-segmented button.secret-deck { display: inline-flex; }
    body.is-elena .vocab-filter-btn.secret-deck { display: inline-flex; }

    .translate-btn,
    .audio-btn,
    .srs-btn {
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease, color .16s ease;
      will-change: transform, box-shadow;
    }
    .translate-btn:hover,
    .audio-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(82, 46, 56, 0.14);
      border-color: rgba(122, 51, 64, 0.28);
    }
    .srs-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 34px rgba(82, 46, 56, 0.18);
    }
    .translate-btn:active,
    .audio-btn:active,
    .srs-btn:active,
    .legacy-header .btn-icon:active,
    .legacy-header .streak-btn:active {
      transform: translateY(0);
      box-shadow: 0 6px 12px rgba(82, 46, 56, 0.10);
    }


    .vocab-overlay {
      position: fixed;
      inset: 0;
      background: #fafaf9;
      z-index: 50;
      display: none;
      flex-direction: column;
      color: #1c1917;
    }
    .vocab-overlay.open { display: flex; }
    .vocab-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid #e7e5e4;
      background: #ffffff;
      height: 52px;
      flex-shrink: 0;
    }
    .vocab-header-left, .vocab-header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .vocab-overlay .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 99px;
      color: #57534e;
      background: transparent;
      border: none;
      box-shadow: none;
    }
    .vocab-overlay .icon-btn:hover {
      background: rgba(153,27,27,.07);
      color: #1c1917;
      transform: none;
    }
    .vocab-title {
      font-size: 16px;
      font-weight: 700;
      color: #1c1917;
    }
    .vocab-count-label {
      font-size: 13px;
      color: #a8a29e;
    }
    .vocab-search-wrap {
      position: relative;
      width: 240px;
    }
    .vocab-search {
      width: 100%;
      padding: 8px 12px 8px 38px;
      border: 1px solid #b15454;
      border-radius: 10px;
      font-family: Inter, system-ui, sans-serif;
      font-size: 13px;
      background: #ffffff;
      color: #57534e;
      outline: none;
    }
    /* (3) Нормальная лупа — SVG как background-image, под контролем размера. */
    .vocab-search-wrap::before {
      content: '';
      position: absolute;
      left: 12px;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translateY(-50%);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a8a29e' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      pointer-events: none;
    }
    .vocab-filters {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-bottom: 1px solid #e7e5e4;
      background: #ffffff;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .vocab-filter-btn {
      padding: 10px 18px;
      border: 1px solid #dedad6;
      background: #ffffff;
      border-radius: 999px;
      font-family: Inter, system-ui, sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: #57534e;
      cursor: pointer;
      transition: all .15s;
    }
    .vocab-filter-btn.active {
      background: #a61d1d;
      color: #fff;
      border-color: #a61d1d;
    }
    .vocab-filter-btn.vocab-filter-heart {
      padding: 8px 12px;
      gap: 6px;
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
    }
    /* Сердечко в фильтре «Избранное» всегда залито красным. */
    .vocab-filter-btn.vocab-filter-heart svg {
      display: block;
      stroke: #c14444;
      fill: #c14444;
    }
    .vocab-filter-btn.vocab-filter-heart.active svg {
      stroke: #ffffff;
      fill: #ffffff;
    }
    /* Статистика выученного под SRS-кнопками */
    .learned-progress {
      width: 100%;
      padding: 16px 0 16px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .learned-progress__label {
      font-size: 15px;
      color: #44403c;
      font-weight: 600;
      text-align: center;
      letter-spacing: -0.01em;
    }
    .learned-progress__track {
      width: 95%;
      margin: 0;
      height: 10px;
      background: #e7e5e4;
      border-radius: 99px;
      overflow: hidden;
      display: flex;
    }
    .learned-progress__seg {
      height: 100%;
      transition: width .35s ease;
    }
    .learned-progress__seg--o { background: #dd7d3c; }
    .learned-progress__seg--y { background: #e6c84a; }
    .learned-progress__seg--g { background: #3a9760; }
    .filter-count {
      font-weight: 500;
      font-size: 11px;
      opacity: .7;
      margin-left: 2px;
    }
    .vocab-stage-stats {
      margin-left: 10px;
      padding-left: 12px;
      border-left: 1px solid #ece7e1;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      column-gap: 14px;
      row-gap: 6px;
      min-height: 40px;
      color: #8b8178;
      font-family: Inter, system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }
    .vocab-stage-stat {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      white-space: nowrap;
    }
    .vocab-stage-stat__label {
      color: #8b8178;
      font-weight: 500;
    }
    .vocab-stage-stat__value {
      color: #3f3a36;
      font-weight: 600;
    }
    .vocab-list-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px 24px;
      background: #fafaf9;
    }
    .vocab-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 14px;
      border-bottom: 1px solid #ebe7e4;
    }
    .vocab-item:last-child { border-bottom: none; }
    .vocab-fav-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      cursor: pointer;
      color: #cbc5c1;
      flex-shrink: 0;
      padding: 0;
      border-radius: 6px;
      transition: color .14s ease;
    }
    .vocab-fav-btn:hover { color: #a61d1d; }
    .vocab-fav-btn.active { color: #a61d1d; }
    .vocab-fav-btn svg { width: 20px; height: 20px; display: block; }
    .vocab-words {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1;
    }
    .vocab-lv {
      font-size: 15px;
      font-weight: 700;
      color: #1c1917;
    }
    .vocab-sep {
      color: #b5adaa;
      font-size: 15px;
    }
    .vocab-ru {
      font-size: 14px;
      color: #6b6662;
    }
    .vocab-action-btn {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      cursor: pointer;
      color: #c2bbb7;
      flex-shrink: 0;
      border-radius: 4px;
      opacity: 0;
      transition: opacity .15s, color .15s;
      font-size: 14px;
      line-height: 1;
    }
    .vocab-item:hover .vocab-action-btn { opacity: .7; }
    .vocab-action-btn.learned.active,
    .vocab-action-btn.learned:hover { color: #16a34a; opacity: 1; }
    .vocab-action-btn.del:hover { color: #a61d1d; opacity: 1; }
    .vocab-empty-state {
      padding: 80px 24px;
      text-align: center;
      color: #a8a29e;
      font-size: 14px;
      line-height: 1.7;
    }
    .vocab-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      border-top: 1px solid #e7e5e4;
      background: #ffffff;
      font-size: 12px;
      color: #a8a29e;
      flex-shrink: 0;
    }
    .btn-export {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border: 1px solid #e1ddd9;
      border-radius: 999px;
      background: #ffffff;
      font-family: Inter, system-ui, sans-serif;
      font-size: 12px;
      color: #a8a29e;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-export:hover {
      color: #991b1b;
      border-color: #991b1b;
      background: rgba(153,27,27,.05);
    }
    .btn-export-header { flex-shrink: 0; }
    .recover-banner {
      background: rgba(153,27,27,.08);
      border-bottom: 1px solid #e7d3d3;
      padding: 10px 24px;
      font-size: 13px;
      color: #991b1b;
      text-align: center;
      font-weight: 500;
      /* Резервируем место всегда, чтобы календарь не прыгал. Скрываем содержимое через visibility. */
      visibility: hidden;
      min-height: 38px;
      box-sizing: border-box;
    }
    .recover-banner.is-visible { visibility: visible; }
    .recover-banner__close {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 26px;
      border: none;
      background: transparent;
      color: #991b1b;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .recover-banner__close:hover { background: rgba(153,27,27,.12); }
    .recover-banner { position: relative; }
    .streak-body {
      padding: 0;
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }
    .streak-layout {
      display: grid;
      grid-template-columns: 60% 40%;
      align-items: stretch;
      min-height: calc(100vh - 53px);
      background: #fafaf9;
    }
    .streak-left {
      padding: 34px 28px 24px 10%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }
    .streak-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 18px;
      background: #fafaf9;
    }
    .streak-big {
      font-size: 128px;
      font-weight: 800;
      color: #111111;
      line-height: .92;
      text-align: center;
      letter-spacing: -0.05em;
    }
    .streak-big small {
      display: block;
      font-size: 30px;
      font-weight: 500;
      color: #55504d;
      margin-top: 16px;
      letter-spacing: 0;
    }
    .streak-today {
      font-size: 18px;
      color: #a29b97;
      margin-top: 16px;
      text-align: center;
    }
    .heatmap-months {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 42px;
      gap: 5px;
      font-size: 12px;
      color: #aba3a0;
      margin-bottom: 8px;
      width: fit-content;
    }
    .heatmap {
      display: grid;
      grid-template-rows: repeat(7, 40px);
      grid-auto-flow: column;
      grid-auto-columns: 40px;
      gap: 4px;
      width: fit-content;
      margin-bottom: 12px;
    }
    .hm-cell {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      background: #efefef;
      border: none;
      cursor: default;
      box-sizing: border-box;
    }
    .hm-empty { background: #ebedf0; }
    /* GitHub-style 4 оттенка зелёного по интенсивности:
       hm-1 = 1–4 открытий, hm-2 = 5–10, hm-3 = 11–15, hm-4 = 16+ */
    .hm-1 { background: #9be9a8; }
    .hm-2 { background: #40c463; }
    .hm-3 { background: #30a14e; }
    .hm-4 { background: #216e39; }
    /* Старый класс «выполнено» — по умолчанию hm-2 (5+ открытий — день выполнен) */
    .hm-done { background: #40c463; }
    .hm-future { background: #ebedf0; opacity: .55; }
    .hm-recover { cursor: pointer; }
    .hm-recover:hover { outline: 2px solid #d7c1bf; }
    .hm-cell:hover { outline: 2px solid #d7c1bf; outline-offset: 1px; }
    .hm-tip {
      position: fixed;
      display: none;
      z-index: 9999;
      background: #1f1d1b;
      color: #ffffff;
      font-size: 24px;
      font-weight: 500;
      line-height: 1.3;
      padding: 10px 16px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: 0 6px 20px rgba(0,0,0,.22);
    }
    .heatmap-legend {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #aba3a0;
      margin-top: 10px;
    }
    .heatmap-legend .hm-cell {
      width: 20px;
      height: 20px;
      border-radius: 5px;
    }
    .streak-hint {
      font-size: 12px;
      color: #aba3a0;
      margin-top: 8px;
      max-width: 520px;
      line-height: 1.35;
    }
    @media (max-width: 900px) {
      .streak-layout { display: flex; flex-direction: column; }
      .streak-left { border-right: 0; border-bottom: 0; border-top: 1px solid var(--shell-line); }
    }
    @media (max-width: 600px) {
      .streak-layout {
        display: flex;
        flex-direction: column;
        min-height: auto;
      }
      /* Сверху: карта. Снизу: цифра + «сегодня» */
      .streak-left { order: 1; padding: 16px 14px 8px; flex: 0 0 auto; align-items: stretch; }
      .streak-right { order: 2; padding: 16px 16px 24px; flex: 1 1 auto; align-items: center; text-align: center; }

      /* Большая цифра + компактный ряд с «сегодня» */
      .streak-big { font-size: 88px; line-height: .9; }
      .streak-big small { font-size: 18px; margin-top: 6px; font-weight: 600; }
      .streak-today { font-size: 14px; margin-top: 14px; }
      .streak-hint { font-size: 11px; max-width: none; }

      /* Карта на всю ширину: ячейки растягиваются */
      .heatmap, .heatmap-months {
        width: 100%;
        grid-auto-columns: minmax(0, 1fr);
      }
      .heatmap { grid-template-rows: repeat(7, minmax(0, 1fr)); aspect-ratio: var(--hm-aspect, 15 / 7); }
      .hm-cell { width: auto; height: auto; border-radius: 4px; }
      .heatmap-legend { font-size: 11px; gap: 6px; flex-wrap: wrap; }
      .heatmap-legend .hm-cell { width: 14px; height: 14px; border-radius: 3px; }
    }

    /* Круглая кнопка динамика слева от фразы — видна только на мобиле */
    .phrase-row { display: contents; }
    .audio-btn-mobile { display: none; }

    /* ────────────────────────────────────────────────────── */
    /* МОБИЛЬНАЯ ВЕРСИЯ — ГЛАВНЫЙ ЭКРАН                                          */
    /* ───────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      html, body { overflow: visible; overflow-x: hidden; height: auto; }
      body { background: var(--shell); }
      .shell {
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        height: auto;
        margin: 0;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        display: flex;
        flex-direction: column;
        grid-template-rows: none;
        overflow: visible;
      }

      /* Компактный header */
      .legacy-header {
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 14px 8px;
        height: auto;
        row-gap: 10px;
      }
      .legacy-header .logo-name { font-size: 14px; }
      /* (г) Декоративная иконка-«гамбургер» без функционала в лого — на мобиле скрываем. */
      .legacy-header .logo-mark { display: none; }

      /* Правая группа: streak + иконка словаря */
      .legacy-header .header-right {
        order: 2;
        margin-left: auto;
        gap: 4px;
      }

      /* Чипы колоды — отдельный ряд на всю ширину, горизонтальный скролл с fade-подсказкой справа */
      .legacy-header .deck-segmented {
        order: 3;
        flex: 1 0 100%;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: none;
        gap: 6px;
        /* Сдвигаем второй ряд вниз, чтобы «Войти» была над ним, а не над первым рядом. После логина этот отступ убирается — см. .auth-in . */
        margin-top: 6px;
        padding-bottom: 2px;
        padding-right: 8px;
        -webkit-overflow-scrolling: touch;
        /* Fade справа — подсказка о горизонтальном скролле */
        -webkit-mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 28px), transparent 100%);
                mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 28px), transparent 100%);
        scroll-snap-type: x proximity;
      }
      .legacy-header .deck-segmented::-webkit-scrollbar { display: none; }
      .legacy-header .deck-segmented button { scroll-snap-align: start; }
      /* Когда докрутили вправо — снимаем fade */
      .legacy-header .deck-segmented.scroll-end {
        -webkit-mask-image: none;
                mask-image: none;
        padding-right: 0;
      }
      .legacy-header .deck-segmented button {
        flex: 0 0 auto;
        padding: 10px 18px;
        font-size: 14px;
        min-height: 40px;
        touch-action: manipulation;
      }
      /* Streak и словарь — поменьше */
      .legacy-header .streak-btn { padding: 4px 6px; font-size: 13px; }
      .legacy-header .btn-icon { width: 32px; height: 32px; }

      /* На мобиле «Войти» — красная пилюля в ПРАВОМ ВЕРХНЕМ углу шапки (абсолютно поверх) */
      .legacy-header .auth-btn-icon { display: none; }
      .legacy-header .auth-btn-text { display: inline; }
      .legacy-header .auth-btn {
        position: absolute;
        top: 4px;
        right: 10px;
        z-index: 4;
        padding: 6px 14px;
        min-height: 30px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #991b1b;
        border: 1px solid #991b1b;
        color: #ffffff;
        font-size: 13px;
        font-weight: 700;
      }
      /* После логина лишнее место сверху убираем — сжимаем второй ряд обратно к шапке. */
      body.auth-in .legacy-header .deck-segmented { margin-top: 0; }
      /* (д) Залогиненный вид — без пилюли, просто текст на уровне логотипа. */
      .legacy-header .auth-btn--in {
        top: 14px;            /* выравниваем по baseline с «Lena Learns Latvian» */
        right: 14px;
        background: transparent;
        border-color: transparent;
        color: #5b504c;
        padding: 0;           /* нет капсулы — нет внутренних отступов */
        min-height: 0;
        gap: 6px;
        font-weight: 500;
        max-width: 160px;
        box-shadow: none;
        line-height: 1;
      }
      .legacy-header .auth-btn--in .auth-btn-name {
        font-weight: 600;
        color: #2d2424;
        font-size: 13px;
      }
      .legacy-header .auth-btn--in .auth-btn-logout {
        font-weight: 400;
        color: #9c918b;
        font-size: 12px;
        margin-left: 4px;
      }
      /* Чтобы правая группа (стрик/словарь) не залезала под пилюлю — резервируем справа отступ */
      .legacy-header .header-right { margin-right: 100px; }

      /* (3.2) Главная область — вертикальный поток; адаптивные отступы и гапы. */
      .page {
        padding: clamp(10px, 2vh, 22px) 14px clamp(16px, 3vh, 32px);
        gap: clamp(10px, 2vh, 22px);
        grid-template-rows: none;
        display: flex;
        flex-direction: column;
        min-height: 0;
        height: 100dvh;
        overflow: hidden;
      }
      .labels { display: none; }

      .content {
        grid-template-columns: 1fr;
        gap: 14px;
        flex: 1 1 0;
        min-height: 0;
      }

      /* (3.2) Mobile: панель жёстко фиксирована по высоте — всё влезает в экран, fit-to-box ужмёт шрифт. */
      .panel {
        padding: clamp(14px, 2.4vh, 24px) clamp(14px, 4vw, 22px);
        border-radius: 20px;
        height: 100%;
        min-height: 0;
        max-height: 100%;
        width: 100%;
        min-width: 0;
        overflow: hidden;
      }
      .panel > div { width: 100%; min-width: 0; }

      /* Сердечко «избранное» на карточке — чуть мельче */
      .panel .card-fav-btn { top: 10px; right: 10px; width: 32px; height: 32px; }
      .panel .card-fav-btn svg { width: 22px; height: 22px; }

      /* Ряд: динамик (слева) + фраза (справа) */
      .phrase-row {
        display: flex;
        align-items: center;
        gap: 12px;
        justify-content: center;
        max-width: 100%;
      }
      .audio-btn-mobile {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 44px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 0;
        background: var(--brand);
        color: #fff;
        cursor: pointer;
        box-shadow: 0 6px 14px rgba(153, 27, 27, 0.28);
        transition: transform .14s ease, box-shadow .14s ease;
      }
      .audio-btn-mobile:active { transform: scale(.94); }
      .audio-btn-mobile.is-playing { background: #7d1414; }
      .audio-btn-mobile:disabled, .audio-btn-mobile[disabled] {
        opacity: 0.85;
        cursor: default;
      }

      /* Скрываем старую кнопку «Прослушать» на мобиле — её роль взял динамик */
      .audio-btn { display: none; }

      /* (3.2) Адаптивный размер фразы: 19–26px в зависимости от высоты экрана. */
      .phrase {
        font-size: clamp(19px, 2.6vh, 26px);
        line-height: 1.25;
        letter-spacing: -.02em;
        max-width: none;
        font-weight: 700;
        text-align: left;
      }
      /* (3.3) Длинные фразы — меньше размер, без жирного. ОДИН размер для LV и RU. */
      .panel.is-long .phrase,
      .panel.is-long .translation-text {
        font-size: clamp(15px, 2vh, 18px);
        font-weight: 500;
        line-height: 1.3;
      }
      .panel.is-xlong .phrase,
      .panel.is-xlong .translation-text {
        font-size: clamp(13px, 1.7vh, 16px);
        font-weight: 500;
        line-height: 1.3;
      }
      .panel.is-mega .phrase,
      .panel.is-mega .translation-text {
        font-size: clamp(11px, 1.4vh, 13px);
        font-weight: 500;
        line-height: 1.32;
      }

      /* Перевод — тот же размер, что и латышский */
      .translate-wrap { height: auto; }
      .translate-btn {
        height: clamp(44px, 6vh, 56px);
        padding: 0 22px;
        font-size: clamp(14px, 1.8vh, 17px);
        width: 100%;
        max-width: 280px;
      }
      .translation-text {
        font-size: clamp(19px, 2.6vh, 26px);
        line-height: 1.25;
        letter-spacing: -.02em;
        font-weight: 700;
        max-width: none;
        text-align: center;
      }
      /* Перевод тоже выравниваем по левому краю когда фраза длинная (как и LV) */
      .panel.is-long .translation-text,
      .panel.is-xlong .translation-text,
      .panel.is-mega .translation-text { text-align: left; }

      /* Сетка оценок 2×2 — тоже адаптивная. */
      .srs-zone {
        grid-template-columns: 1fr 1fr;
        gap: clamp(8px, 1.4vh, 14px);
        padding: clamp(8px, 1.4vh, 14px);
        border-radius: 20px;
        min-height: 0;
      }
      .srs-btn {
        min-height: clamp(74px, 11vh, 110px);
        border-radius: 16px;
        box-shadow: 0 6px 14px rgba(82, 46, 56, 0.10);
      }
      .srs-fill { padding: 8px 10px 10px; }
      .srs-top { font-size: 14px; }
      .srs-label {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -.02em;
      }

      /* ──────────────────────────────────── */
      /* СЛОВАРЬ НА МОБИЛЕ                              */
      /* ──────────────────────────────────── */
      .vocab-overlay { background: #ffffff; }

      .vocab-header {
        flex-wrap: wrap;
        padding: 10px 14px 8px;
        height: auto;
        row-gap: 8px;
      }
      .vocab-header-left { gap: 8px; flex: 1 1 auto; min-width: 0; }
      .vocab-header-right {
        order: 3;
        flex: 1 0 100%;
      }
      .vocab-title { font-size: 17px; }
      .vocab-count-label { font-size: 14px; }

      /* Поиск — отдельный ряд, перемещён ПОСЛЕ фильтров (через JS), чтобы не вылезала клавиатура */
      .vocab-search-wrap { width: 100%; }
      .vocab-search-wrap.vocab-search-mobile-row {
        padding: 0 14px 8px;
        background: #fafaf9;
      }
      .vocab-search { font-size: 15px; padding: 10px 12px 10px 36px; }
      .vocab-search-mobile-row::before { left: 26px; }

      /* Фильтры: горизонтальный скролл с fade-подсказкой */
      .vocab-filters {
        flex-wrap: nowrap;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: none;
        padding: 10px 14px;
        gap: 6px;
        -webkit-overflow-scrolling: touch;
        -webkit-mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 24px), transparent 100%);
                mask-image: linear-gradient(to right, #000 0, #000 calc(100% - 24px), transparent 100%);
      }
      .vocab-filters.scroll-end {
        -webkit-mask-image: none;
                mask-image: none;
      }
      .vocab-filters::-webkit-scrollbar { display: none; }
      .vocab-filter-btn {
        flex: 0 0 auto;
        padding: 8px 14px;
        font-size: 13px;
      }
      .vocab-filter-btn.vocab-filter-heart { padding: 7px 10px; }
      /* Статистику по стадиям на мобиле прячем — перегружает */
      .vocab-stage-stats { display: none; }

      /* Список */
      .vocab-list-wrap { padding: 0 14px 24px; }
      /* Плотные строки на мобиле — меньше вертикального воздуха, разделители остаются */
      .vocab-item {
        padding: 8px 4px;
        gap: 8px;
        border-bottom: 1px solid #ebe7e4;
      }
      .vocab-words { gap: 4px; }
      /* Русский и латышский — одинаковый размер (правило продукта) */
      .vocab-lv { font-size: 17px; line-height: 1.25; }
      .vocab-ru { font-size: 17px; line-height: 1.25; color: #44403c; }
      .vocab-fav-btn { width: 36px; height: 36px; }

// (а) Блокировка pinch-zoom для iOS Safari (user-scalable=no игнорируется)
(function blockPinchZoom() {
  // Блокируем жест двумя пальцами (iOS-специфичное событие)
  document.addEventListener('gesturestart', function (e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturechange', function (e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('gestureend', function (e) { e.preventDefault(); }, { passive: false });
  // Блокируем мультитач
  document.addEventListener('touchstart', function (e) {
    if (e.touches && e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', function (e) {
    if (e.touches && e.touches.length > 1) e.preventDefault();
  }, { passive: false });
  // Блокируем double-tap zoom
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function (e) {
    const now = Date.now();
    if (now - lastTouchEnd <= 350) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });
  document.addEventListener('dblclick', function (e) { e.preventDefault(); }, { passive: false });
})();

// Хелпер: правильное склонение «1 день / 2 дня / 5 дней»
function pluralizeDays(n) {
  const abs = Math.abs(n) % 100;
  const n1 = abs % 10;
  if (abs > 10 && abs < 20) return 'дней подряд';
  if (n1 > 1 && n1 < 5) return 'дня подряд';
  if (n1 === 1) return 'день подряд';
  return 'дней подряд';
}

window.addEventListener('DOMContentLoaded', function () {
  const audioButton = document.querySelector('.audio-btn');

  const phraseEl = document.querySelector('.panel-lv .phrase') || document.querySelector('.phrase');
  const translateWrap = document.querySelector('.translate-wrap');
  const srsButtons = Array.from(document.querySelectorAll('.srs-btn'));
  const iconButtons = Array.from(document.querySelectorAll('.icon-btn'));

  const vocabClose = document.getElementById('vocabClose');
  const vocabListWrap = document.getElementById('vocabListWrap');
  const vocabEmpty = document.getElementById('vocabEmpty');
  const vocabSearch = document.getElementById('vocabSearch');
  const vocabCountLabel = document.getElementById('vocabCountLabel');
  const vocabFooterStats = document.getElementById('vocabFooterStats');
  const countAll = document.getElementById('countAll');
  const countFav = document.getElementById('countFav');
  const countLearned = document.getElementById('countLearned');
  const countA2 = document.getElementById('countA2');
  const countB2 = document.getElementById('countB2');
  const countLena = document.getElementById('countLena');
  const countTop = document.getElementById('countTop');
  const countOtvety = document.getElementById('countOtvety');
  const countTeksty = document.getElementById('countTeksty');
  const vocabExport = document.getElementById('vocabExport');
  const streakBtn = document.getElementById('streakBtn');
  const streakOverlay = document.getElementById('streakOverlay');
  const streakClose = document.getElementById('streakClose');
  const streakBig = document.getElementById('streakBig');
  const streakToday = document.getElementById('streakToday');
  const heatmap = document.getElementById('heatmap');
  const heatmapMonths = document.getElementById('heatmapMonths');
  const recoverBanner = document.getElementById('recoverBanner');
  const toast = document.getElementById('toast');

  if (!phraseEl || !translateWrap) return;

  const DAILY_GOAL = 5;
  const STORAGE_VOCAB = 'lll2_vocabulary';
  const STORAGE_STREAK = 'lll2_streak';
  const STORAGE_STAGE_PROGRESS = 'lll2_stage_progress';

  const STORAGE_DECK_MODE = 'lll2_deck_mode';
  const DECK_RANGES = {
    all:    null,
    a2:     [1, 540],
    lena:   [541, 1362],
    b2:     [1363, 2816],
    top:    [2817, 2989],
    otvety: [2990, 3364],
    teksty: [3365, 3586],
  };
  // (в) По умолчанию ВСЕГДА «Все», игнорируем сохранённый чип в localStorage.
  // Само сохранение оставляем — на случай будущих изменений политики.
  let deckMode = 'all';
  try {
    const saved = localStorage.getItem(STORAGE_DECK_MODE);
    if (false && saved && Object.prototype.hasOwnProperty.call(DECK_RANGES, saved)) deckMode = saved;
  } catch(e) {}

  // Секретные диапазоны (видны только Лене): Карточки Лены + Топ/Ответы/Тексты
  function isSecretId(id) {
    var n = Number(id);
    if (!Number.isFinite(n)) return false;
    if (n >= 541 && n <= 1362) return true;   // Карточки Лены
    if (n >= 2817 && n <= 3586) return true;  // Топ / Ответы / Тексты
    return false;
  }
  function isElenaUser() {
    return document.body && document.body.classList && document.body.classList.contains('is-elena');
  }

  function buildDeck() {
    if (!Array.isArray(PHRASES)) return [];
    const range = DECK_RANGES[deckMode];
    const elena = isElenaUser();
    return PHRASES.filter(item => {
      if (!item || typeof item.lv !== 'string' || !item.lv.trim()) return false;
      if (range) {
        const id = Number(item.id);
        if (!Number.isFinite(id) || id < range[0] || id > range[1]) return false;
      } else if (!elena) {
        // Режим «Все» для не-Лены: исключаем секретные фразы
        if (isSecretId(item.id)) return false;
      }
      return true;
    });
  }

  let deck = buildDeck();
  if (!deck.length) deck = [{ lv: 'Dati nav ielādēti.', ru: 'Данные не загрузились.' }];

  let currentIndex = 0;

  const deckSegmented = document.getElementById('deckSegmented');
  function syncDeckSegmented() {
    if (!deckSegmented) return;
    deckSegmented.querySelectorAll('button[data-deck]').forEach(function (btn) {
      const isActive = btn.getAttribute('data-deck') === deckMode;
      btn.classList.toggle('active', isActive);
      btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
  }
  syncDeckSegmented();
  // Toggle scroll-end class когда пользователь докрутил чипы вправо — убираем fade
  function updateDeckScrollEnd() {
    if (!deckSegmented) return;
    var max = deckSegmented.scrollWidth - deckSegmented.clientWidth;
    if (max <= 2) {
      // Нечего скроллить — фейд не нужен
      deckSegmented.classList.add('scroll-end');
    } else {
      deckSegmented.classList.toggle('scroll-end', deckSegmented.scrollLeft >= max - 2);
    }
  }
  if (deckSegmented) {
    deckSegmented.addEventListener('scroll', updateDeckScrollEnd, { passive: true });
    window.addEventListener('resize', updateDeckScrollEnd);
    setTimeout(updateDeckScrollEnd, 0);
  }
  // При входе/выходе Лены — перестроить колоду и прогресс (влияет на «Все»)
  document.addEventListener('lll:elena-changed', function () {
    try {
      // Если был выбран секретный чип, а Лена вышла — сбросить на «Все»
      var elena = document.body.classList.contains('is-elena');
      if (!elena && (deckMode === 'lena' || deckMode === 'top' || deckMode === 'otvety' || deckMode === 'teksty')) {
        deckMode = 'all';
        try { localStorage.setItem(STORAGE_DECK_MODE, deckMode); } catch(_) {}
        if (typeof syncDeckSegmented === 'function') syncDeckSegmented();
      }
      deck = buildDeck();
      if (!deck.length) deck = [{ lv: 'Dati nav ielādēti.', ru: 'Данные не загрузились.' }];
      if (typeof refillBatch === 'function') { refillBatch(); srsNext(); } else { currentIndex = 0; }
      if (typeof renderPhrase === 'function') renderPhrase();
      if (typeof renderVocab === 'function') renderVocab();
      if (typeof updateLearnedProgress === 'function') updateLearnedProgress();
    } catch(_) {}
  });

  if (deckSegmented) {
    deckSegmented.addEventListener('click', function (ev) {
      const btn = ev.target.closest('button[data-deck]');
      if (!btn) return;
      const next = btn.getAttribute('data-deck');
      if (!next || next === deckMode || !Object.prototype.hasOwnProperty.call(DECK_RANGES, next)) return;
      deckMode = next;
      try { localStorage.setItem(STORAGE_DECK_MODE, deckMode); } catch(e) {}
      syncDeckSegmented();
      deck = buildDeck();
      if (!deck.length) deck = [{ lv: 'Šajā kopā nav frāžu.', ru: 'В этом наборе нет фраз.' }];
      if (typeof refillBatch === 'function') { refillBatch(); srsNext(); } else { currentIndex = 0; }
      if (typeof renderPhrase === 'function') renderPhrase();
      if (typeof renderVocab === 'function') renderVocab();
      if (typeof updateLearnedProgress === 'function') updateLearnedProgress();
    });
  }
  let translationOpen = false;
  let vocabFilter = 'all';
  let vocabSearchQuery = '';
  let toastTimer = null;
  let ttsAudio = null;

  let vocabulary = [];
  let streakState = { days: {}, recoverDate: null };
  let stageProgress = {};
  try { vocabulary = JSON.parse(localStorage.getItem(STORAGE_VOCAB) || '[]'); } catch(e) { vocabulary = []; }
  try { streakState = Object.assign(streakState, JSON.parse(localStorage.getItem(STORAGE_STREAK) || '{}')); } catch(e) {}
  // Сброс невалидного recoverDate при загрузке: если дата не сегодняшняя — окно восстановления закрыто
  try {
    if (streakState.recoverDate) {
      var _tk = (function(){ var d = new Date(); var y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+dd; })();
      if (streakState.recoverDate !== _tk) {
        streakState.recoverDate = null;
        localStorage.setItem(STORAGE_STREAK, JSON.stringify(streakState));
      }
    }
  } catch(e) {}
  try { stageProgress = JSON.parse(localStorage.getItem(STORAGE_STAGE_PROGRESS) || '{}'); } catch(e) { stageProgress = {}; }

  // ---- SRS (посессионный, Leitner-стиль) ----
  // phraseState[id] = { stage: 0|1|2|3, due: <session#>, reps: <int> }
  // Интервалы по сессиям: 0 -> в этой же; 1 -> +1; 2 -> +3; 3 -> [+7, +14, +30, +30...]
  const STORAGE_PHRASE_STATE = 'lll2_phrase_state';
  const STORAGE_SESSION_COUNT = 'lll2_session_count';
  const STAGE3_STEPS = [7, 14, 30];
  const BATCH_SIZE = 10;
  const BATCH_QUOTAS = { stage0: 4, stage12: 5, stage3: 1 };

  let phraseState = {};
  try { phraseState = JSON.parse(localStorage.getItem(STORAGE_PHRASE_STATE) || '{}'); } catch(e) { phraseState = {}; }

  let sessionCount = 0;
  try { sessionCount = parseInt(localStorage.getItem(STORAGE_SESSION_COUNT) || '0', 10) || 0; } catch(e) { sessionCount = 0; }
  // Каждая загрузка страницы = новая сессия.
  sessionCount += 1;
  try { localStorage.setItem(STORAGE_SESSION_COUNT, String(sessionCount)); } catch(e) {}

  // Миграция старого stageProgress -> phraseState (один раз).
  (function migrateStageProgress() {
    if (!stageProgress || typeof stageProgress !== 'object') return;
    const keys = Object.keys(stageProgress);
    if (!keys.length) return;
    let migrated = 0;
    keys.forEach(function(id) {
      if (phraseState[id]) return; // уже мигрирована
      const v = stageProgress[id];
      if (v === -1) { phraseState[id] = { stage: 1, due: sessionCount, reps: 0 }; migrated++; }
      else if (v === 1) { phraseState[id] = { stage: 2, due: sessionCount, reps: 0 }; migrated++; }
      else if (v === 5) { phraseState[id] = { stage: 3, due: sessionCount + STAGE3_STEPS[0], reps: 1 }; migrated++; }
    });
    if (migrated) savePhraseState();
  })();

  function savePhraseState() {
    try { localStorage.setItem(STORAGE_PHRASE_STATE, JSON.stringify(phraseState)); } catch(e) {}
  }
  function getPhraseStage(id) {
    const st = phraseState[String(id)];
    return st ? st.stage : 0;
  }
  function getPhraseDue(id) {
    const st = phraseState[String(id)];
    return st ? st.due : 0;
  }
  function setPhraseStage(id, stage) {
    const key = String(id);
    const prev = phraseState[key] || { stage: 0, due: 0, reps: 0 };
    let due, reps = prev.reps || 0;
    if (stage === 0) { due = sessionCount; reps = 0; }
    else if (stage === 1) { due = sessionCount + 1; reps = 0; }
    else if (stage === 2) { due = sessionCount + 3; reps = 0; }
    else if (stage === 3) {
      reps = (prev.stage === 3 ? reps : 0) + 1;
      const stepIdx = Math.min(reps - 1, STAGE3_STEPS.length - 1);
      due = sessionCount + STAGE3_STEPS[stepIdx];
    }
    phraseState[key] = { stage: stage, due: due, reps: reps };
    savePhraseState();
    // Дублируем в stageProgress для совместимости со счётчиками словаря (но используем стадии 0/1/2/3 -> -5/-1/1/5).
    if (stage === 0) delete stageProgress[key];
    else if (stage === 1) stageProgress[key] = -1;
    else if (stage === 2) stageProgress[key] = 1;
    else if (stage === 3) stageProgress[key] = 5;
    saveStageProgress();
  }

  // Формирование партии. Возвращает массив фраз (объекты deck) длиной до BATCH_SIZE.
  function buildBatch() {
    const sess = sessionCount;
    const buckets = { 0: [], 12: [], 3: [], future: [] };
    deck.forEach(function(p) {
      if (!p || p.id == null) return;
      // Пропустить выученные-через-словарь (lll2_vocabulary.learned=true) — они «откладываются»
      const key = String(p.id);
      const learned = vocabulary.find(function(v){ return String(v.id) === key && v.learned; });
      if (learned) return;
      const st = phraseState[key];
      const stage = st ? st.stage : 0;
      const due = st ? st.due : 0;
      if (due > sess) { buckets.future.push(p); return; }
      if (stage === 0) buckets[0].push(p);
      else if (stage === 1 || stage === 2) buckets[12].push(p);
      else if (stage === 3) buckets[3].push(p);
    });
    function shuf(arr) { for (let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
    shuf(buckets[0]); shuf(buckets[12]); shuf(buckets[3]); shuf(buckets.future);
    const slots = { 0: BATCH_QUOTAS.stage0, 12: BATCH_QUOTAS.stage12, 3: BATCH_QUOTAS.stage3 };
    const picked = [];
    function take(b, n) {
      while (n > 0 && buckets[b].length) { picked.push(buckets[b].shift()); n--; }
      return n;
    }
    let leftover = 0;
    leftover += take(0,  slots[0]);
    leftover += take(12, slots[12]);
    leftover += take(3,  slots[3]);
    // Перетекание недобора: 0 <- 12 <- 3 и обратно.
    let remaining = BATCH_SIZE - picked.length;
    while (remaining > 0 && (buckets[0].length || buckets[12].length || buckets[3].length || buckets.future.length)) {
      if (buckets[0].length) picked.push(buckets[0].shift());
      else if (buckets[12].length) picked.push(buckets[12].shift());
      else if (buckets[3].length) picked.push(buckets[3].shift());
      else if (buckets.future.length) picked.push(buckets.future.shift());
      remaining--;
    }
    // Защита: если совсем пусто (например, все выученные) — возьмём что-нибудь из deck
    if (!picked.length && deck.length) picked.push(deck[Math.floor(Math.random()*deck.length)]);
    shuf(picked);
    return picked;
  }

  let currentBatch = [];
  let batchPos = 0;
  function refillBatch() {
    currentBatch = buildBatch();
    batchPos = 0;
  }

  function fitTextToPanel(panel, textEl) {
    if (!panel || !textEl || !textEl.textContent.trim()) return;
    // Сброс inline-стилей и старт с CSS-дефолта
    textEl.style.fontSize = '';
    textEl.style.lineHeight = '';
    var startSize = parseFloat(getComputedStyle(textEl).fontSize) || 36;
    var minSize = 12;
    var size = startSize;
    var iterations = 0;
    while (iterations < 40) {
      // Проверяем переполнение ПАНЕЛИ и САМОГО ТЕКСТОВОГО элемента по ширине.
      var overflowsH = panel.scrollHeight > panel.clientHeight + 1;
      var overflowsW = textEl.scrollWidth > textEl.clientWidth + 1 || panel.scrollWidth > panel.clientWidth + 1;
      if (!overflowsH && !overflowsW) break;
      if (size <= minSize) break;

  function buildHeatmap() {

    const start = new Date(today);
    start.setDate(today.getDate() - ((cols - 1) * rows + dowMon));

    const monthNames = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
    const monthFull = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    const dowFull = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];

      div.textContent = label;
      heatmapMonths.appendChild(div);
    });

    const todayKeyStr = todayKey();
    for (let c = 0; c < cols; c++) {
      for (let r = 0; r < rows; r++) {
        const index = c * rows + r;
        const d = new Date(start);
        d.setDate(start.getDate() + index);
        const key = d.toISOString().slice(0, 10);
        const cell = document.createElement('div');
        const done = isDayDone(key);
        const count = getDayProgress(key);
        const isFuture = key > todayKeyStr;
        const isToday = key === todayKeyStr;
        // 4 уровня интенсивности GitHub-style
        let lvl = 'hm-empty';
        if (count >= 16) lvl = 'hm-4';
        else if (count >= 11) lvl = 'hm-3';
        else if (count >= 5) lvl = 'hm-2';
        else if (count >= 1) lvl = 'hm-1';
        cell.className = 'hm-cell ' + lvl;
        if (isFuture) cell.classList.add('hm-future');
        // Кастомный тултип: "понедельник, 28 апреля — 5 фраз"
        const dowLabel = dowFull[d.getDay()];
        const phrasesLabel = pluralizePhrases(count);
        const dateLabel = d.getDate() + ' ' + monthFull[d.getMonth()];
        cell.dataset.tip = isFuture
          ? (dowLabel + ', ' + dateLabel)
          : (dowLabel + ', ' + dateLabel + ' — ' + count + ' ' + phrasesLabel);
        cell.addEventListener('mouseenter', showHmTip);
        cell.addEventListener('mouseleave', hideHmTip);
        // Кликом восстанавливаем ТОЛЬКО прошлые пустые дни (не сегодня, не будущее, не выполненные)
        if (!done && !isFuture && !isToday) {
          cell.classList.add('hm-recover');
          cell.addEventListener('click', function () {
            streakState.recoverDate = key;
            saveStreak();
            updateStreakSummary();
            buildHeatmap();
          });
        }
        heatmap.appendChild(cell);
      }
    }
  }

  function pluralizePhrases(n) {
    const nn = Math.abs(n) % 100;
    const n1 = nn % 10;
    if (nn > 10 && nn < 20) return 'фраз';
    if (n1 > 1 && n1 < 5) return 'фразы';
    if (n1 === 1) return 'фраза';
    return 'фраз';
  }

  // Кастомный тултип хитмапа
  let hmTipEl = null;
  function ensureHmTip() {
    if (hmTipEl) return hmTipEl;
    hmTipEl = document.createElement('div');
    hmTipEl.className = 'hm-tip';
    document.body.appendChild(hmTipEl);
    return hmTipEl;
  }
  function showHmTip(ev) {
    const tip = ensureHmTip();
    tip.textContent = ev.currentTarget.dataset.tip || '';
    const r = ev.currentTarget.getBoundingClientRect();
    tip.style.display = 'block';
    // Позиционируем сверху по центру ячейки
    const tipR = tip.getBoundingClientRect();
    let left = r.left + r.width / 2 - tipR.width / 2;
    left = Math.max(8, Math.min(left, window.innerWidth - tipR.width - 8));
    const top = r.top - tipR.height - 8;
    tip.style.left = left + 'px';
    tip.style.top = (top < 4 ? r.bottom + 8 : top) + 'px';
  }
  function hideHmTip() {
    if (hmTipEl) hmTipEl.style.display = 'none';
  }
  function recordTranslation() {
    const key = streakState.recoverDate || todayKey();
    const state = streakState.days[key] || { count: 0 };
    // Снял cap, чтобы интенсивность хитмапа (4 уровня) отражала реальные открытия.
    state.count = state.count + 1;
    streakState.days[key] = state;
    if (state.count >= DAILY_GOAL && streakState.recoverDate === key) {
      streakState.recoverDate = null;
      showToast('День восстановлен');
    }
    saveStreak();
    updateStreakSummary();
    buildHeatmap();
  }

  translationButton.addEventListener('click', function () {
    translationOpen = true;
    renderTranslation();
    recordTranslation();
  });

  if (audioButton) {
    // Флаг: блокируем повторный запуск, пока идёт fetch или играет аудио — иначе эхо.
    let ttsBusy = false;
    function setAudioBusy(busy) {
      ttsBusy = busy;
      if (audioButton) audioButton.disabled = busy;
      if (audioButtonMobile) {
        audioButtonMobile.disabled = busy;
        audioButtonMobile.classList.toggle('is-playing', busy);
      }
    }
    audioButton.addEventListener('click', async function () {
      const text = phraseEl.textContent.trim();
      if (!text) return;
      // Если играет — останавливаем (toggle).
      if (ttsAudio && !ttsAudio.paused) {
        ttsAudio.pause();
        ttsAudio.currentTime = 0;
        setPlayIcon('play');
        setAudioBusy(false);
        return;
      }
      // Если уже загружаем — игнорируем клик.
      if (ttsBusy) return;
      setAudioBusy(true);
      audioButton.classList.add('is-pressed');
      setTimeout(function () { audioButton.classList.remove('is-pressed'); }, 150);
      setPlayIcon('pause');
      try {
        const r = await fetch(TRANSLATEWORKER, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'tts', text, lang: 'lv-LV' })
        });
        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        ttsAudio = new Audio(url);
        ttsAudio.addEventListener('ended', function () { setPlayIcon('play'); URL.revokeObjectURL(url); setAudioBusy(false); }, { once: true });
        ttsAudio.addEventListener('error', function () { setPlayIcon('play'); URL.revokeObjectURL(url); setAudioBusy(false); }, { once: true });
        await ttsAudio.play();
      } catch (e) {
        console.warn('TTS error', e);
        setPlayIcon('play');
        setAudioBusy(false);
      }
    });
  }

  srsButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      var phrase = currentPhrase();
      var phraseId = phrase && phrase.id ? String(phrase.id) : null;
      // Новые стадии: 0=Ужас-ужас (красная), 1=Ещё туплю (оранж), 2=ОК (жёлто-зел), 3=Выучено (зел)
      var stage = 0;
      if (btn.classList.contains('orange')) stage = 1;
      else if (btn.classList.contains('yellowgreen')) stage = 2;
      else if (btn.classList.contains('green')) stage = 3;
      srsButtons.forEach(function (b) { b.classList.remove('is-selected'); });
      btn.classList.add('is-selected');
      if (phraseId) {
        setPhraseStage(phraseId, stage);
      }
      if (stage === 3) {
        ensureVocabEntry(true);
        showToast('Фраза перенесена в выученное');
      } else {
        renderVocab();
      }
      setTimeout(nextPhrase, 180);
    });
  });

  iconButtons.forEach(function (btn) {
    btn.addEventListener('click', function () {
      btn.classList.add('is-pressed');
      setTimeout(function () { btn.classList.remove('is-pressed'); }, 150);
    });
  });

  menuLinks.forEach(function (link) {
    link.addEventListener('click', function (e) {
      e.preventDefault();
      menuLinks.forEach(function (l) { l.classList.remove('active-link'); });
      link.classList.add('active-link');
    });
  });

  // На мобиле перемещаем поиск НИЖЕ фильтров, чтобы при открытии словаря не вылезала клавиатура.
  function reorderVocabForViewport() {
    const overlay = document.getElementById('vocabOverlay');
    if (!overlay) return;
    const header = overlay.querySelector('.vocab-header');
    const headerRight = overlay.querySelector('.vocab-header-right');
    const searchWrap = overlay.querySelector('.vocab-search-wrap');
    const filters = overlay.querySelector('.vocab-filters');
    const list = overlay.querySelector('.vocab-list-wrap');
    if (!searchWrap || !filters || !list) return;
    const isMobile = window.matchMedia('(max-width: 600px)').matches;
    if (isMobile) {
      // Выносим поиск из шапки и кладём между фильтрами и списком
      if (searchWrap.parentElement === headerRight) {
        overlay.insertBefore(searchWrap, list);
        searchWrap.classList.add('vocab-search-mobile-row');
      }
    } else {
      // Возвращаем в шапку
      if (searchWrap.parentElement !== headerRight && headerRight) {
        headerRight.insertBefore(searchWrap, headerRight.firstChild);
        searchWrap.classList.remove('vocab-search-mobile-row');
      }
    }
  }
  window.addEventListener('resize', reorderVocabForViewport);
  reorderVocabForViewport();

  vocabToggle.addEventListener('click', function () {
    reorderVocabForViewport();
    vocabOverlay.classList.add('open');
    renderVocab();
    // Фокус на поиск — только на десктопе (на мобиле вылезает клавиатура)
    if (vocabSearch && window.matchMedia('(min-width: 601px)').matches) vocabSearch.focus();
  });
  vocabClose.addEventListener('click', function () { vocabOverlay.classList.remove('open'); });
  streakBtn.addEventListener('click', function () { streakOverlay.classList.add('open'); updateStreakSummary(); buildHeatmap(); });
  streakClose.addEventListener('click', function () { streakOverlay.classList.remove('open'); });
  vocabSearch.addEventListener('input', function (e) { vocabSearchQuery = e.target.value.trim().toLowerCase(); renderVocab(); });
  document.querySelectorAll('.vocab-filter-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.vocab-filter-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      vocabFilter = btn.dataset.filter;
      renderVocab();
    });
  });
  // Scroll-end логика для vocab-фильтров (убираем fade-маску когда докрутили до конца)
  (function() {
    var vocabFiltersEl = document.querySelector('.vocab-filters');
    if (!vocabFiltersEl) return;
    function updateVocabFiltersScrollEnd() {
      var max = vocabFiltersEl.scrollWidth - vocabFiltersEl.clientWidth;
      if (max <= 2) vocabFiltersEl.classList.add('scroll-end');
      else vocabFiltersEl.classList.toggle('scroll-end', vocabFiltersEl.scrollLeft >= max - 2);
    }
    vocabFiltersEl.addEventListener('scroll', updateVocabFiltersScrollEnd, { passive: true });
    window.addEventListener('resize', updateVocabFiltersScrollEnd);
    setTimeout(updateVocabFiltersScrollEnd, 0);
    // Пересчитать при открытии словаря
    var vt = document.getElementById('vocabToggle');
    if (vt) vt.addEventListener('click', function() { setTimeout(updateVocabFiltersScrollEnd, 50); });
  })();
  vocabListWrap.addEventListener('click', function (e) {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id = btn.dataset.id;
    if (!id) return;
    const phrase = deck.find(p => p && String(p.id) === String(id));
    if (!phrase) return;
    if (btn.dataset.action === 'fav') {
      const lv = normalizeTranslation(phrase.lv);
      const ru = normalizeTranslation(phrase.ru);
      let found = vocabulary.find(v => String(v.id) === String(id));
      if (!found) {
        found = { id: phrase.id, lv, ru, fav: true, learned: false };
        vocabulary.push(found);
      } else {
        found.fav = !found.fav;
      }
      saveVocab(); updateBadge(); renderVocab();
      if (typeof syncCardFav === 'function') syncCardFav();
    }
  });
  vocabExport.addEventListener('click', function () {
    const rows = ['Latviešu,Перевод'].concat(vocabulary.map(v => '"' + v.lv.replace(/"/g,'""') + '","' + v.ru.replace(/"/g,'""') + '"'));
    const csvText = '\ufeff' + rows.join('\n');
    const blob = new Blob([csvText], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'my-vocabulary.csv'; a.click(); URL.revokeObjectURL(url);
  });

  updateBadge();
  renderVocab();
  updateStreakSummary();
  buildHeatmap();
  refillBatch();
  srsNext();
  renderPhrase();
  setPlayIcon('play');

  // Приход данных из облака (Realtime/pull) — перерисовываем без сброса текущей фразы.
  window.addEventListener('lll:cloud-sync', function (ev) {
    var d = (ev && ev.detail) || {};
    if (d.vocab) {
      try { vocabulary = JSON.parse(localStorage.getItem('lll2_vocabulary') || '[]'); } catch (e) {}
    }
    if (d.state) {
      try { phraseState = JSON.parse(localStorage.getItem('lll2_phrase_state') || '{}'); } catch (e) {}
    }
    if (d.streak) {
      try { streakState = JSON.parse(localStorage.getItem('lll2_streak') || '{"days":{},"recoverDate":null}'); } catch (e) {}
    }
    if (d.stage) {
      try { stageProgress = JSON.parse(localStorage.getItem('lll2_stage_progress') || '{}'); } catch (e) {}
    }
    updateBadge();
    renderVocab();
    updateStreakSummary();
    buildHeatmap();
  });
});
</script>
  <div class="vocab-overlay" id="vocabOverlay">
    <div class="vocab-header">
      <div class="vocab-header-left">
        <button class="icon-btn" id="vocabClose" title="Закрыть">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <span class="vocab-title">Мой словарь</span>
        <span class="vocab-count-label" id="vocabCountLabel">· 0 слов</span>
      </div>
      <div class="vocab-header-right">
        <div class="vocab-search-wrap"><input class="vocab-search" id="vocabSearch" type="text" placeholder="Поиск по словарю"></div>
        <button class="btn-export btn-export-header" id="vocabExport">Скачать</button>
      </div>
    </div>
    <div class="vocab-filters">
      <button class="vocab-filter-btn active" data-filter="all">Все <span class="filter-count" id="countAll">0</span></button>
      <button class="vocab-filter-btn vocab-filter-heart" data-filter="fav" title="Избранное" aria-label="Избранное">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#c14444" stroke="#c14444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="filter-count" id="countFav">0</span>
      </button>
      <button class="vocab-filter-btn" data-filter="a2">A2 <span class="filter-count" id="countA2">0</span></button>
      <button class="vocab-filter-btn" data-filter="b2">B2 <span class="filter-count" id="countB2">0</span></button>
      <button class="vocab-filter-btn secret-deck" data-filter="lena">Карточки Лены <span class="filter-count" id="countLena">0</span></button>
      <button class="vocab-filter-btn secret-deck" data-filter="top">Топ <span class="filter-count" id="countTop">0</span></button>
      <button class="vocab-filter-btn secret-deck" data-filter="otvety">Ответы <span class="filter-count" id="countOtvety">0</span></button>
      <button class="vocab-filter-btn secret-deck" data-filter="teksty">Тексты <span class="filter-count" id="countTeksty">0</span></button>
      <button class="vocab-filter-btn" data-filter="learned">Выучено <span class="filter-count" id="countLearned">0</span></button>
      <div class="vocab-stage-stats" id="vocabStageStats" aria-live="polite" aria-atomic="true">
        <span class="vocab-stage-stat"><span class="vocab-stage-stat__label">Ужас-ужас:</span><span class="vocab-stage-stat__value" id="countStageNeg5">500</span></span>
        <span class="vocab-stage-stat"><span class="vocab-stage-stat__label">Ещё туплю:</span><span class="vocab-stage-stat__value" id="countStageNeg1">0</span></span>
        <span class="vocab-stage-stat"><span class="vocab-stage-stat__label">ОК:</span><span class="vocab-stage-stat__value" id="countStagePos1">0</span></span>
        <span class="vocab-stage-stat"><span class="vocab-stage-stat__label">Выучено!:</span><span class="vocab-stage-stat__value" id="countStagePos5">0</span></span>
      </div>
    </div>
    <div class="vocab-list-wrap" id="vocabListWrap">
      <div class="vocab-empty-state" id="vocabEmpty">Пока словарь пуст.</div>
    </div>

  </div>

  <div class="vocab-overlay" id="streakOverlay">
    <div class="vocab-header">
      <div class="vocab-header-left">
        <span class="vocab-title">Стрик</span>
      </div>
      <div class="vocab-header-right">
        <button class="icon-btn" id="streakClose" title="Закрыть">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
    </div>
    <div class="recover-banner" id="recoverBanner"></div>
    <div class="streak-body">
      <div class="streak-layout">
        <div class="streak-left">
          <div class="heatmap-months" id="heatmapMonths"></div>
          <div class="heatmap" id="heatmap"></div>
          <div class="heatmap-legend"><span>Меньше</span><span class="hm-cell hm-empty"></span><span class="hm-cell hm-1"></span><span class="hm-cell hm-2"></span><span class="hm-cell hm-3"></span><span class="hm-cell hm-4"></span><span>Больше</span></div>
          <div class="streak-hint">Клик на пустой день = восстановить</div>
        </div>
        <div class="streak-right">
          <div class="streak-big" id="streakBig">0<small>дней подряд</small></div>
          <div class="streak-today" id="streakToday">Сегодня: 0 / 5</div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

</body>
</html>
