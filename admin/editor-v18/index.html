<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Редактор постов · Decap CMS · Елена Масолова</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f3; }
    /* Пока CMS грузится */
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      color: #1f1f1e; font-size: 15px; letter-spacing: .02em;
    }
  </style>
</head>
<body>
  <div id="loading">Загружаю редактор…</div>

  <!-- Decap CMS из CDN -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Прячем «Загружаю…» как только Decap инициализировался
    window.CMS && window.CMS.registerEventListener({
      name: 'mounted',
      handler: () => { const el = document.getElementById('loading'); if (el) el.remove(); }
    });

    // Автоудаление заглушки на всякий случай
    setTimeout(() => { const el = document.getElementById('loading'); if (el) el.remove(); }, 2500);
  </script>
</body>
</html>
