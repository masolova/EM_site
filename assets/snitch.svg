<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- V2: «Прямые крылья» — широкие крылья с тремя крупными «гребешками-перьями»,
       более угловатые, ближе к гарри-поттеровской геральдической версии. -->

  <!-- Шарик -->
  <circle cx="60" cy="74" r="12"/>
  <!-- Маленькие декоративные точки-звёздочки (отражения) -->
  <circle cx="56" cy="71" r="1.2" fill="currentColor" stroke="none"/>

  <!-- ЛЕВОЕ КРЫЛО: 3 чётких пера-«языка» сверху -->
  <path d="M52 62
           C 44 60, 32 54, 22 44
           C 16 38, 12 28, 14 18
           L 22 30
           C 22 26, 26 24, 30 24
           L 34 36
           C 36 32, 40 30, 44 32
           L 46 44
           C 48 42, 50 44, 52 62 Z"/>

  <!-- ПРАВОЕ КРЫЛО: зеркало -->
  <path d="M68 62
           C 76 60, 88 54, 98 44
           C 104 38, 108 28, 106 18
           L 98 30
           C 98 26, 94 24, 90 24
           L 86 36
           C 84 32, 80 30, 76 32
           L 74 44
           C 72 42, 70 44, 68 62 Z"/>
</svg>
